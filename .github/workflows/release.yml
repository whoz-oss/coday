name: Release and Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

env:
  NPM_CONFIG_PROVENANCE: true
  NX_MAX_WORKERS: 4

defaults:
  run:
    shell: bash

jobs:
  # Job 1: Release (version, build, changelog, GitHub release, and npm publish)
  release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.release.outputs.new_version }}
      release_sha: ${{ steps.release_sha.outputs.sha }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://${{ vars.NPM_REGISTRY }}'

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run nx release (version, build, GitHub release, and publish)
        id: release
        env:
          HUSKY: 0
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: npx tsx scripts/release.ts

      - name: Capture release commit SHA
        id: release_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Write job summary
        if: always()
        run: |
          if [ -n "${{ steps.release.outputs.new_version }}" ]; then
            echo "## 🏷️ Release v${{ steps.release.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⏭️ No release needed" >> $GITHUB_STEP_SUMMARY
            echo "No releasable commits (\`feat:\`, \`fix:\`, \`feat!:\` / \`fix!:\`, or \`BREAKING CHANGE:\` in commit body) touching files of a releasable project (\`tag:platform:npm\` or \`tag:platform:jvm\`) found since the last release tag." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  # Job 2: Build and upload desktop apps (Coday + Coday Twin)
  desktop-release:
    runs-on: macos-latest
    needs: release
    if: needs.release.outputs.new_version
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.release_sha }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import Code Signing Certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate from base64
          echo "$MACOS_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate to keychain
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Set keychain for codesign to use
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Verify certificates are available
          security find-identity -v "$KEYCHAIN_PATH"

      - name: Build and Package Coday Desktop
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          pnpm nx run desktop:package-pkg

      - name: Build and Package Coday Twin Desktop
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          pnpm nx run desktop-twin:package-pkg

      - name: Cleanup Keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Upload packages to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="${{ needs.release.outputs.new_version }}"
          TAG="release/${VERSION}"

          # Upload Coday Desktop PKG
          PKG_PATH=$(find apps/desktop/release -name "*.pkg" -type f | head -1)
          if [ -n "$PKG_PATH" ]; then
            echo "Uploading $PKG_PATH to release $TAG"
            gh release upload "$TAG" "$PKG_PATH" --clobber
          else
            echo "Warning: Coday Desktop PKG not found"
          fi

          # Upload Coday Twin Desktop PKG
          TWIN_PKG_PATH=$(find apps/desktop-twin/release -name "*.pkg" -type f | head -1)
          if [ -n "$TWIN_PKG_PATH" ]; then
            echo "Uploading $TWIN_PKG_PATH to release $TAG"
            gh release upload "$TAG" "$TWIN_PKG_PATH" --clobber
          else
            echo "Warning: Coday Twin PKG not found"
          fi

  # Job 3: Publish all JVM artifacts to GitHub Packages
  publish-agentos-artifacts:
    name: publish jvm artifacts to github packages
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.new_version

    permissions:
      contents: read
      packages: write

    env:
      # 20 = max concurrent jobs for GitHub Free plan on standard runners
      NX_PARALLEL: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.release_sha }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Grant execute permission for gradlew
        working-directory: agentos
        run: chmod +x gradlew

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: pnpm nx run-many -t publish --projects="tag:platform:jvm"
