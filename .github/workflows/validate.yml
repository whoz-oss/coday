name: Validate Coday on pull requests

on:
  pull_request:
    types: [opened, synchronize]
    branches: [master]

env:
  NX_MAX_WORKERS: 4

defaults:
  run:
    shell: bash

jobs:
  validate-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and test TypeScript projects
        run: npx nx affected --base=origin/${GITHUB_BASE_REF} --head=HEAD --target="lint,test" --exclude="tag:platform:jvm" --parallel=$NX_MAX_WORKERS --verbose

  validate-jvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # nx affected cannot be used directly with --projects="tag:platform:jvm" because the tag filter
      # gets forwarded to the underlying Gradle/Jest commands as an unknown flag, causing build failures.
      # Instead, we resolve the affected JVM project names first via nx show projects, then pass the
      # explicit names to nx run-many (which does not forward them to executors).
      - name: Build and test JVM projects
        run: |
          AFFECTED_JVM=$(npx nx show projects --affected --base=origin/${GITHUB_BASE_REF} --head=HEAD --projects="tag:platform:jvm" --json --quiet | jq -r 'join(",")')
          if [ -n "$AFFECTED_JVM" ]; then
            npx nx run-many --targets=build,test --projects="$AFFECTED_JVM" --parallel=$NX_MAX_WORKERS --verbose
          else
            echo "No affected JVM projects"
          fi

      - name: Check OpenAPI spec is up to date
        run: npx nx affected --base=origin/${GITHUB_BASE_REF} --head=HEAD --target="check-openapi-spec" --verbose

  merge-gate:
    runs-on: ubuntu-latest
    needs: [validate-ts, validate-jvm]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJson(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more validation jobs failed or were cancelled"
            exit 1
          fi
          echo "All validation jobs passed or were skipped"
