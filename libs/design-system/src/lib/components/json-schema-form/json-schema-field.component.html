<div class="ds-field">
  <label class="ds-field__label" [for]="inputId">
    {{ label }}
    @if (required()) {
      <span class="ds-field__required" aria-hidden="true">*</span>
    }
  </label>

  @if (description) {
    <p class="ds-field__description">{{ description }}</p>
  }

  @switch (fieldType) {
    @case ('text') {
      <input
        class="ds-field__input"
        [type]="htmlInputType"
        [id]="inputId"
        [formControl]="control()"
        [attr.required]="required() || null"
      />
    }
    @case ('number') {
      <input
        class="ds-field__input"
        type="number"
        [id]="inputId"
        [formControl]="control()"
        [attr.required]="required() || null"
      />
    }
    @case ('boolean') {
      <div class="ds-field__checkbox-row">
        <input class="ds-field__checkbox" type="checkbox" [id]="inputId" [formControl]="control()" />
        <span class="ds-field__checkbox-label">{{ label }}</span>
      </div>
    }
    @case ('enum') {
      <select class="ds-field__select" [id]="inputId" [formControl]="control()" [attr.required]="required() || null">
        @if (!required()) {
          <option value="">— none —</option>
        }
        @for (option of enumOptions; track option) {
          <option [value]="option">{{ option }}</option>
        }
      </select>
    }
    @case ('nested-object') {
      <div class="ds-field__nested">
        <ds-json-schema-form
          [schema]="fieldSchema()"
          [value]="nestedValue"
          (valueChange)="onNestedValueChange($event)"
        />
      </div>
    }
    @case ('textarea') {
      <textarea
        class="ds-field__textarea"
        [id]="inputId"
        rows="4"
        [formControl]="control()"
        [attr.required]="required() || null"
        placeholder="JSON"
      ></textarea>
    }
  }

  @for (error of errors(); track error) {
    <p class="ds-field__error" role="alert">{{ error }}</p>
  }
</div>
