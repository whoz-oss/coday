<div class="namespace-list">
  <header class="namespace-list__header">
    <h2>Namespaces</h2>
  </header>

  @if (namespaces$ | async; as namespaces) {
    @if (namespaces.length === 0) {
      <div class="namespace-list__empty">
        <p>No namespaces available.</p>
      </div>
    } @else {
      <ul class="namespace-list__items">
        @for (ns of namespaces; track trackById($index, ns)) {
          <li class="namespace-list__item">
            <button class="namespace-list__item-btn" (click)="select(ns)" type="button">
              <span class="namespace-list__item-name">{{ ns.name }}</span>
              @if (ns.description) {
                <span class="namespace-list__item-desc">{{ ns.description }}</span>
              }
            </button>
          </li>
        }
      </ul>
    }
  }
</div>
