<div class="namespace-list">
  <header class="namespace-list__header">
    <h2>Namespaces</h2>
    <ds-icon-button icon="add" variant="primary" title="Create namespace" (action)="openCreateForm()" />
  </header>

  @if (isCreating()) {
    <form class="namespace-list__create-form" (ngSubmit)="submitCreate()">
      <input class="namespace-list__input" type="text" placeholder="Namespace name *" [formControl]="nameControl" />
      <input
        class="namespace-list__input"
        type="text"
        placeholder="Description (optional)"
        [formControl]="descriptionControl"
      />
      <div class="namespace-list__create-actions">
        <ds-icon-button
          icon="check"
          variant="primary"
          title="Confirm"
          [disabled]="nameControl.invalid || isSubmitting()"
          (action)="submitCreate()"
        />
        <ds-icon-button icon="close" title="Cancel" (action)="cancelCreate()" />
      </div>
    </form>
  }

  @if (namespaces$ | async; as namespaces) {
    @if (namespaces.length === 0) {
      <div class="namespace-list__empty">
        <p>No namespaces yet. Create one above.</p>
      </div>
    } @else {
      <ul class="namespace-list__items" role="list">
        @for (ns of namespaces; track trackById($index, ns)) {
          <agentos-namespace-item
            [namespace]="ns"
            (selected)="select($event)"
            (deleteRequested)="deleteNamespace($event)"
          />
        }
      </ul>
    }
  }
</div>
