<ds-entity-list
  title="AI models"
  [items]="(modelItems$ | async) ?? []"
  [showCreate]="true"
  emptyMessage="No AI models configured yet. Add one above."
  cardMinWidth="400px"
  [itemTemplate]="aiModelItemTpl"
  (createRequested)="openCreateForm()"
>
  <button toolbar-start class="namespace-ai-models__back" type="button" (click)="goBack()">&#8592; Namespaces</button>
</ds-entity-list>

<!-- Item template: renders AiModelItemComponent for each entity-list card slot -->
<ng-template #aiModelItemTpl let-item>
  @if (resolveModel(item.id); as model) {
    <agentos-ai-model-item [model]="model" [namespaceId]="namespaceId" (deleteRequested)="deleteModel($event)" />
  }
</ng-template>
