<ds-entity-list
  title="AI models"
  [items]="(modelItems$ | async) ?? []"
  [showCreate]="true"
  emptyMessage="No AI models configured yet. Add one above."
  cardMinWidth="400px"
  [itemTemplate]="aiModelItemTpl"
  (createRequested)="openCreateForm()"
>
  <ds-icon-button toolbar-start icon="arrow_back" title="Back" (action)="goBack()" />
</ds-entity-list>

<!-- Item template: renders AiModelItemComponent for each entity-list card slot -->
<ng-template #aiModelItemTpl let-item>
  @if (resolveModel(item.id); as model) {
    <agentos-ai-model-item
      [model]="model"
      [namespaceId]="namespaceId"
      [readOnly]="isPlatformModel(item.id)"
      (deleteRequested)="deleteModel($event)"
      (editRequested)="editModel($event)"
    />
  }
</ng-template>
