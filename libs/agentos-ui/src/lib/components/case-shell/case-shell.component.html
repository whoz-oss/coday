<div class="case-shell">
  <!-- ═══ MOBILE TOP BAR ═══ -->
  <agentos-shell-topbar-mobile
    [selectedNamespace]="selectedNamespace()"
    [namespaces]="namespaces()"
    [nsMenuOpen]="nsMenuOpen()"
    [userInitials]="userInitials()"
    [menuOpen]="menuOpen()"
    [isAdmin]="isAdmin()"
    [isDark]="isDark()"
    [showTechnical]="showTechnical()"
    (homeClicked)="navigateHome()"
    (namespaceSelected)="onNamespaceSelected($event)"
    (nsMenuToggled)="toggleNsMenu($event)"
    (nsMenuClosed)="closeNsMenu($event)"
    (menuToggled)="toggleMenu($event)"
    (menuClosed)="closeMenu($event)"
    (navigateTo)="onMenuNavigate($event)"
    (themeToggled)="onMenuToggleTheme()"
    (logsToggled)="onMenuToggleLogs()"
  />

  <!-- ═══ MOBILE CASE SWITCHER ═══ -->
  <agentos-shell-case-switcher-mobile
    [cases]="cases()"
    [activeCaseId]="activeCaseId()"
    [open]="mobileSwitcherOpen()"
    (caseSelected)="onMobileCaseSelect($event)"
    (createRequested)="onMobileCreateCase()"
    (toggled)="toggleMobileSwitcher()"
  />

  <!-- ═══ DESKTOP SIDEBAR ═══ -->
  <agentos-shell-sidebar
    [sidebarWidth]="sidebarWidth()"
    [selectedNamespace]="selectedNamespace()"
    [namespaces]="namespaces()"
    [showNsPicker]="showNsPicker()"
    [nsMenuOpen]="nsMenuOpen()"
    [cases]="cases()"
    [activeCaseId]="activeCaseId()"
    [userInitials]="userInitials()"
    [menuOpen]="menuOpen()"
    [isAdmin]="isAdmin()"
    [isDark]="isDark()"
    [showTechnical]="showTechnical()"
    (homeClicked)="navigateHome()"
    (namespaceSelected)="onNamespaceSelected($event)"
    (nsMenuToggled)="toggleNsMenu()"
    (nsMenuClosed)="closeNsMenu($event)"
    (caseSelected)="onCaseSelected($event)"
    (createRequested)="onCreateRequested()"
    (menuToggled)="toggleMenu($event)"
    (menuClosed)="closeMenu($event)"
    (navigateTo)="onMenuNavigate($event)"
    (themeToggled)="onMenuToggleTheme()"
    (logsToggled)="onMenuToggleLogs()"
  />

  <!-- Resize handle -->
  <div
    class="case-shell__resize-handle"
    role="separator"
    tabindex="-1"
    aria-label="Resize sidebar"
    (mousedown)="onResizeStart($event)"
  ></div>

  <!-- ═══ MAIN ═══ -->
  <main class="case-shell__main">
    @if (activeCaseId()) {
      <agentos-case-chat [showTechnicalOverride]="showTechnical()" />
    } @else {
      <agentos-case-home />
    }
  </main>
</div>
