<div class="case-shell">
  <!-- ═══ MOBILE TOP BAR ═══
       hamburger | {C} | NS picker | spacer | + New case
  -->
  <agentos-shell-topbar-mobile
    [selectedNamespace]="selectedNamespace()"
    [namespaces]="namespaces()"
    [nsMenuOpen]="nsMenuOpen()"
    (drawerToggled)="toggleMobileDrawer()"
    (createRequested)="onMobileCreateCase()"
    (namespaceSelected)="onNamespaceSelected($event)"
    (nsMenuToggled)="toggleNsMenu($event)"
    (nsMenuClosed)="closeNsMenu($event)"
  />

  <!-- ═══ MOBILE CASE DRAWER (overlay slide-in) ═══ -->
  <agentos-shell-case-switcher-mobile
    [open]="mobileDrawerOpen()"
    [cases]="cases()"
    [activeCaseId]="activeCaseId()"
    [userInitials]="userInitials()"
    [userName]="userName()"
    [isAdmin]="isAdmin()"
    [isDark]="isDark()"
    (closed)="mobileDrawerOpen.set(false)"
    (caseSelected)="onMobileCaseSelect($event)"
    (starToggled)="onStarToggled($event)"
    (deleteRequested)="onDeleteRequested($event)"
    (navigateTo)="onMenuNavigate($event)"
    (themeToggled)="onMenuToggleTheme()"
    (logsToggled)="onMenuToggleLogs()"
  />

  <!-- ═══ DESKTOP SIDEBAR ═══ -->
  <agentos-shell-sidebar
    [sidebarWidth]="sidebarWidth()"
    [sidebarOpen]="sidebarOpen()"
    [selectedNamespace]="selectedNamespace()"
    [namespaces]="namespaces()"
    [showNsPicker]="showNsPicker()"
    [nsMenuOpen]="nsMenuOpen()"
    [cases]="cases()"
    [activeCaseId]="activeCaseId()"
    [userInitials]="userInitials()"
    [userName]="userName()"
    [menuOpen]="menuOpen()"
    [isAdmin]="isAdmin()"
    [isDark]="isDark()"
    [showTechnical]="showTechnical()"
    (collapseRequested)="collapseSidebar()"
    (homeClicked)="navigateHome()"
    (namespaceSelected)="onNamespaceSelected($event)"
    (nsMenuToggled)="toggleNsMenu()"
    (nsMenuClosed)="closeNsMenu($event)"
    (caseSelected)="onCaseSelected($event)"
    (createRequested)="onCreateRequested()"
    (deleteRequested)="onDeleteRequested($event)"
    (starToggled)="onStarToggled($event)"
    (menuToggled)="toggleMenu($event)"
    (menuClosed)="closeMenu($event)"
    (navigateTo)="onMenuNavigate($event)"
    (themeToggled)="onMenuToggleTheme()"
    (logsToggled)="onMenuToggleLogs()"
  />

  <!-- Resize handle (hidden when sidebar is collapsed) -->
  @if (sidebarOpen()) {
    <div
      class="case-shell__resize-handle"
      role="separator"
      tabindex="-1"
      aria-label="Resize sidebar"
      (mousedown)="onResizeStart($event)"
    ></div>
  }

  <!-- Expand button — floats top-left when sidebar is collapsed -->
  @if (!sidebarOpen()) {
    <button class="case-shell__expand-btn" type="button" title="Open sidebar" (click)="expandSidebar()">
      <span class="material-icons">menu</span>
    </button>
  }

  <!-- ═══ MAIN ═══ -->
  <main class="case-shell__main">
    @if (activeCaseId()) {
      <agentos-case-chat
        [showTechnicalOverride]="showTechnical()"
        (starToggled)="onStarToggled($event)"
        (deleteRequested)="onDeleteRequested($event)"
        (logsToggled)="onMenuToggleLogs()"
      />
    } @else {
      <agentos-case-home [namespaceName]="selectedNamespace()?.name ?? null" />
    }
  </main>
</div>
