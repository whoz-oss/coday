@if (open()) {
  <div class="mobile-drawer__overlay">
    <button
      class="mobile-drawer__backdrop"
      type="button"
      aria-label="Close cases drawer"
      (click)="closed.emit()"
    ></button>

    <!-- Panneau slide-in -->
    <div
      class="mobile-drawer__panel"
      role="dialog"
      aria-modal="true"
      aria-label="Cases"
      (click)="$event.stopPropagation()"
      (keydown)="$event.stopPropagation()"
    >
      <!-- Header -->
      <div class="mobile-drawer__header">
        <span class="mobile-drawer__header-title">Cases</span>
        <button class="mobile-drawer__close-btn" type="button" title="Close" (click)="closed.emit()">
          <svg
            width="17"
            height="17"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            aria-hidden="true"
          >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </div>

      <!-- Search -->
      <div class="mobile-drawer__search-wrap">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          class="mobile-drawer__search-icon"
          aria-hidden="true"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.3-4.3" />
        </svg>
        <input
          class="input mobile-drawer__search-input"
          type="search"
          placeholder="Filter cases…"
          [value]="filterQuery()"
          (input)="filterQuery.set($any($event.target).value)"
          autocomplete="off"
        />
      </div>

      <!-- Case list -->
      <div class="mobile-drawer__list">
        @for (group of groupedCases(); track group.label) {
          <div class="mobile-drawer__group">
            <div class="mobile-drawer__group-label">{{ group.label }}</div>
            @for (c of group.cases; track c.id) {
              <!-- <button> : élément interactif focusable, accessible clavier -->
              <button
                class="mobile-drawer__case-row"
                [class.mobile-drawer__case-row--active]="c.id === activeCaseId()"
                [class.mobile-drawer__case-row--confirming]="confirmingDeleteId() === c.id"
                type="button"
                (click)="onCaseSelect(c.id ?? '')"
              >
                <!-- Status glyph -->
                <agentos-case-status-glyph [status]="c.status" [size]="15" />

                <!-- Title -->
                <span class="mobile-drawer__case-title">{{ c.title ?? c.id }}</span>

                <!-- Actions: star + delete (always visible on mobile) -->
                @if (confirmingDeleteId() !== c.id) {
                  <div class="mobile-drawer__case-actions">
                    <button
                      class="mobile-drawer__case-btn"
                      [class.mobile-drawer__case-btn--active]="c.starred"
                      type="button"
                      title="Pin case"
                      (click)="onStarToggle($event, c)"
                    >
                      <svg
                        width="15"
                        height="15"
                        viewBox="0 0 24 24"
                        [attr.fill]="c.starred ? 'currentColor' : 'none'"
                        stroke="currentColor"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <path
                          d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"
                        />
                      </svg>
                    </button>
                    <button
                      class="mobile-drawer__case-btn mobile-drawer__case-btn--danger"
                      type="button"
                      title="Delete case"
                      (click)="onDeleteRequest($event, c.id ?? '')"
                    >
                      <svg
                        width="15"
                        height="15"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <path d="M3 6h18" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        <line x1="10" x2="10" y1="11" y2="17" />
                        <line x1="14" x2="14" y1="11" y2="17" />
                      </svg>
                    </button>
                  </div>
                } @else {
                  <!-- Delete confirmation -->
                  <div class="mobile-drawer__case-confirm">
                    <button
                      class="mobile-drawer__confirm-yes"
                      type="button"
                      title="Confirm delete"
                      (click)="onDeleteConfirm($event, c.id)"
                    >
                      <svg
                        width="15"
                        height="15"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <path d="M20 6 9 17l-5-5" />
                      </svg>
                    </button>
                    <button
                      class="mobile-drawer__confirm-no"
                      type="button"
                      title="Cancel"
                      (click)="onDeleteCancel($event)"
                    >
                      <svg
                        width="15"
                        height="15"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        aria-hidden="true"
                      >
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                      </svg>
                    </button>
                  </div>
                }
              </button>
            }
          </div>
        }

        @if (groupedCases().length === 0) {
          <p class="mobile-drawer__empty">No cases yet.</p>
        }
      </div>

      <!-- User menu footer -->
      <div class="mobile-drawer__footer">
        @if (userMenuOpen()) {
          <button
            class="mobile-drawer__user-menu-backdrop"
            type="button"
            aria-label="Close user menu"
            (click)="userMenuOpen.set(false)"
          ></button>
          <div class="mobile-drawer__user-menu">
            <div class="mobile-drawer__user-menu-section">
              <button class="mobile-drawer__user-menu-item" type="button" (click)="onMenuNavigate('/agentos/profile')">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  style="color: var(--color-neutral-600)"
                >
                  <circle cx="12" cy="8" r="4" />
                  <path d="M20 21a8 8 0 0 0-16 0" />
                </svg>
                User settings
              </button>
              <button
                class="mobile-drawer__user-menu-item"
                type="button"
                (click)="onMenuNavigate('/agentos/namespaces')"
              >
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  style="color: var(--color-neutral-600)"
                >
                  <rect width="7" height="7" x="3" y="3" />
                  <rect width="7" height="7" x="14" y="3" />
                  <rect width="7" height="7" x="14" y="14" />
                  <rect width="7" height="7" x="3" y="14" />
                </svg>
                Namespaces
              </button>
              @if (isAdmin()) {
                <button class="mobile-drawer__user-menu-item" type="button" (click)="onMenuNavigate('/agentos/admin')">
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                    style="color: var(--color-neutral-600)"
                  >
                    <path
                      d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1 1 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z"
                    />
                  </svg>
                  Administration
                </button>
              }
              <button class="mobile-drawer__user-menu-item" type="button" (click)="onMenuLogsToggle()">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  style="color: var(--color-neutral-600)"
                >
                  <polyline points="4 17 10 11 4 5" />
                  <line x1="12" x2="20" y1="19" y2="19" />
                </svg>
                Technical logs
              </button>
            </div>
            <div class="mobile-drawer__user-menu-sep"></div>
            <div class="mobile-drawer__user-menu-section">
              <button class="mobile-drawer__user-menu-item" type="button" (click)="onMenuThemeToggle()">
                @if (!isDark()) {
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                    style="color: var(--color-neutral-600)"
                  >
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                  </svg>
                } @else {
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                    style="color: var(--color-neutral-600)"
                  >
                    <circle cx="12" cy="12" r="4" />
                    <path d="M12 2v2" />
                    <path d="M12 20v2" />
                    <path d="m4.93 4.93 1.41 1.41" />
                    <path d="m17.66 17.66 1.41 1.41" />
                    <path d="M2 12h2" />
                    <path d="M20 12h2" />
                    <path d="m6.34 17.66-1.41 1.41" />
                    <path d="m19.07 4.93-1.41 1.41" />
                  </svg>
                }
                Dark mode
                <span style="flex: 1"></span>
                <span class="mobile-drawer__user-menu-hint">{{ isDark() ? 'On' : 'Off' }}</span>
              </button>
            </div>
          </div>
        }
        <button class="mobile-drawer__user-btn" type="button" (click)="userMenuOpen.set(!userMenuOpen())">
          <span class="mobile-drawer__user-avatar">{{ userInitials() }}</span>
          <span class="mobile-drawer__user-info">
            <span class="mobile-drawer__user-name">{{ userName() }}</span>
          </span>
          <svg
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="mobile-drawer__user-chevron"
            aria-hidden="true"
          >
            <path d="m7 15 5 5 5-5" />
            <path d="m7 9 5-5 5 5" />
          </svg>
        </button>
      </div>
    </div>
  </div>
}
