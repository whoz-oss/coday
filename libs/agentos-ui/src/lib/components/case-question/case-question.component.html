<div class="case-question" [class.locked]="isLocked">
  <div class="case-question-header">
    <mat-icon class="case-question-icon" fontSet="material-icons-outlined">help_outline</mat-icon>
    <span class="case-question-meta">{{ event.agentName || 'Agent' }} demande</span>
  </div>

  <div class="case-question-text">{{ event.question }}</div>

  @if (hasOptions) {
    <div class="case-question-options">
      @for (option of options; track option) {
        <button
          type="button"
          class="case-question-button"
          [class.selected]="respondedAnswer === option"
          [disabled]="isLocked"
          (click)="onOptionClick(option)"
        >
          @if (respondedAnswer === option) {
            <mat-icon class="case-question-check" fontSet="material-icons-outlined">check</mat-icon>
          }
          <span class="case-question-button-label">{{ option }}</span>
        </button>
      }
    </div>
  } @else {
    <div class="case-question-custom">
      <textarea
        class="case-question-textarea"
        rows="2"
        [(ngModel)]="customAnswer"
        [disabled]="isLocked"
        placeholder="Tape ta réponse…"
        (keydown)="onCustomKeyDown($event)"
      ></textarea>
      <button
        type="button"
        class="case-question-button case-question-submit"
        [disabled]="isLocked || !customAnswer.trim()"
        (click)="onCustomSubmit()"
      >
        <span class="case-question-button-label">Envoyer</span>
      </button>
    </div>
  }

  @if (isLocked) {
    <div class="case-question-indicator">
      <mat-icon class="case-question-indicator-icon" fontSet="material-icons-outlined">check_circle</mat-icon>
      <span
        >Réponse envoyée : <strong>{{ respondedAnswer }}</strong></span
      >
    </div>
  }
</div>
