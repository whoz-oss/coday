<div class="ai-model-form">
  <header class="ai-model-form__header">
    <button class="ai-model-form__back" type="button" (click)="cancel()" title="Back to LLM models">
      <span class="ai-model-form__back-icon">&#8592;</span>
      LLM Models
    </button>
    <h1 class="ai-model-form__title">{{ isEditMode() ? 'Edit LLM model' : 'New LLM model' }}</h1>
  </header>

  @if (isLoading()) {
    <p class="ai-model-form__loading">Loading&hellip;</p>
  } @else {
    <form class="ai-model-form__form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="ai-model-form__field">
        <label class="ai-model-form__label" for="model-provider"> Provider <span aria-hidden="true">*</span> </label>
        @if (isEditMode()) {
          <!-- Read-only in edit mode: provider cannot be reassigned after creation -->
          <input
            id="model-provider"
            class="ai-model-form__input ai-model-form__input--readonly"
            type="text"
            [value]="selectedProviderLabel()"
            readonly
            tabindex="-1"
          />
        } @else {
          <select id="model-provider" class="ai-model-form__select" [formControl]="aiProviderIdControl">
            <option value="" disabled>Select provider</option>
            @for (provider of providers(); track trackByProvider($index, provider)) {
              <option [value]="provider.id">{{ provider.name }} ({{ provider.apiType }})</option>
            }
          </select>
        }
      </div>

      <div class="ai-model-form__field">
        <label class="ai-model-form__label" for="model-api-name"> API name <span aria-hidden="true">*</span> </label>
        <input
          id="model-api-name"
          class="ai-model-form__input ai-model-form__input--mono"
          type="text"
          placeholder="e.g. gpt-4o, claude-3-5-sonnet-20241022"
          [formControl]="apiNameControl"
          autocomplete="off"
        />
      </div>

      <div class="ai-model-form__field">
        <label class="ai-model-form__label" for="model-alias">Alias</label>
        <input
          id="model-alias"
          class="ai-model-form__input"
          type="text"
          placeholder="e.g. fast, smart — short identifier used internally"
          [formControl]="aliasControl"
          autocomplete="off"
        />
      </div>

      <div class="ai-model-form__field">
        <label class="ai-model-form__label" for="model-priority">Priority</label>
        <input
          id="model-priority"
          class="ai-model-form__input"
          type="number"
          placeholder="0 — higher wins when multiple configs share the same alias"
          min="0"
          step="1"
          [formControl]="priorityControl"
        />
      </div>

      <div class="ai-model-form__row">
        <div class="ai-model-form__field">
          <label class="ai-model-form__label" for="model-temperature">Temperature</label>
          <input
            id="model-temperature"
            class="ai-model-form__input"
            type="number"
            placeholder="0 – 2"
            min="0"
            max="2"
            step="0.1"
            [formControl]="temperatureControl"
          />
        </div>

        <div class="ai-model-form__field">
          <label class="ai-model-form__label" for="model-max-tokens">Max tokens</label>
          <input
            id="model-max-tokens"
            class="ai-model-form__input"
            type="number"
            placeholder="e.g. 4096"
            min="1"
            step="1"
            [formControl]="maxTokensControl"
          />
        </div>
      </div>

      <div class="ai-model-form__actions">
        <button
          class="ai-model-form__btn ai-model-form__btn--primary"
          type="submit"
          [disabled]="form.invalid || isSubmitting()"
        >
          {{ isEditMode() ? 'Save changes' : 'Create' }}
        </button>
        <button class="ai-model-form__btn" type="button" (click)="cancel()">Cancel</button>
      </div>
    </form>
  }
</div>
