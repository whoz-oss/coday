<div class="namespace-item" role="listitem">
  <button class="namespace-item__body" type="button" (click)="onSelect()">
    <span class="namespace-item__name">{{ namespace().name }}</span>
    @if (namespace().description) {
      <span class="namespace-item__desc">{{ namespace().description }}</span>
    }
  </button>

  <div class="namespace-item__actions">
    <ds-icon-button icon="delete" variant="danger" title="Delete namespace" (action)="onDelete()" />
  </div>
</div>
