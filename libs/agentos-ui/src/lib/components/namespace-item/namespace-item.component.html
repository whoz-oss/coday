<div class="namespace-item" role="listitem" [class.namespace-item--pending-delete]="pendingDelete()">
  <button class="namespace-item__body" type="button" (click)="onSelect()">
    <span class="namespace-item__name">{{ namespace().name }}</span>
    @if (namespace().description) {
      <span class="namespace-item__desc">{{ namespace().description }}</span>
    }
  </button>

  <div class="namespace-item__actions">
    @if (pendingDelete()) {
      <span class="namespace-item__confirm-label">Delete?</span>
      <ds-icon-button icon="check" variant="danger" title="Confirm deletion" (action)="onDeleteConfirmed()" />
      <ds-icon-button icon="close" title="Cancel deletion" (action)="onDeleteCancelled()" />
    } @else {
      <ds-kebab-menu [items]="menuItems" (itemSelected)="onMenuAction($event)" />
    }
  </div>
</div>
