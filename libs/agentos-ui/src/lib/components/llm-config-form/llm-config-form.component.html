<div class="llm-config-form">
  <header class="llm-config-form__header">
    <button class="llm-config-form__back" type="button" (click)="cancel()" title="Back to LLM providers">
      <span class="llm-config-form__back-icon">&#8592;</span>
      LLM Providers
    </button>
    <h1 class="llm-config-form__title">{{ isEditMode() ? 'Edit LLM provider' : 'New LLM provider' }}</h1>
  </header>

  @if (isLoading()) {
    <p class="llm-config-form__loading">Loading&hellip;</p>
  } @else {
    <form class="llm-config-form__form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="llm-config-form__field">
        <label class="llm-config-form__label" for="llm-api-type">API type <span aria-hidden="true">*</span></label>
        <select id="llm-api-type" class="llm-config-form__select" [formControl]="apiTypeControl">
          @for (type of apiTypeOptions; track type) {
            <option [value]="type">{{ type }}</option>
          }
        </select>
      </div>

      <div class="llm-config-form__field">
        <label class="llm-config-form__label" for="llm-name">Name <span aria-hidden="true">*</span></label>
        <input
          id="llm-name"
          class="llm-config-form__input"
          type="text"
          placeholder="e.g. OpenAI prod"
          [formControl]="nameControl"
          autocomplete="off"
        />
      </div>

      <div class="llm-config-form__field">
        <label class="llm-config-form__label" for="llm-base-url">Base URL</label>
        <input
          id="llm-base-url"
          class="llm-config-form__input"
          type="url"
          placeholder="Optional — leave empty for default endpoint"
          [formControl]="baseUrlControl"
          autocomplete="off"
        />
      </div>

      <div class="llm-config-form__field">
        <label class="llm-config-form__label" for="llm-api-key">API key</label>
        <input
          id="llm-api-key"
          class="llm-config-form__input llm-config-form__input--secret"
          type="password"
          placeholder="sk-…"
          [formControl]="apiKeyControl"
          autocomplete="new-password"
        />
      </div>

      <div class="llm-config-form__actions">
        <button
          class="llm-config-form__btn llm-config-form__btn--primary"
          type="submit"
          [disabled]="form.invalid || isSubmitting()"
        >
          {{ isEditMode() ? 'Save changes' : 'Create' }}
        </button>
        <button class="llm-config-form__btn" type="button" (click)="cancel()">Cancel</button>
      </div>
    </form>
  }
</div>
