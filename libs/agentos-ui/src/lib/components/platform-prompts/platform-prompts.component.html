<ds-entity-list
  title="Platform Prompts"
  [items]="(promptItems$ | async) ?? []"
  [showCreate]="true"
  emptyMessage="No platform prompts defined yet. Add one above."
  cardMinWidth="400px"
  [itemTemplate]="promptItemTpl"
  (createRequested)="openCreateForm()"
>
  <ds-icon-button toolbar-start icon="arrow_back" title="Back" (action)="goBack()" />
</ds-entity-list>

<!-- Item template: renders PromptItemComponent for each entity-list card slot -->
<ng-template #promptItemTpl let-item>
  @if (resolvePrompt(item.id); as prompt) {
    <agentos-prompt-item [prompt]="prompt" [platformMode]="true" (deleteRequested)="deletePrompt($event)" />
  }
</ng-template>
