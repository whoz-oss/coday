<ds-entity-list
  title="User Groups"
  [hideTitle]="hideTitle()"
  [items]="groupItems()"
  [showCreate]="true"
  emptyMessage="No user groups yet. Create one above."
  cardMinWidth="400px"
  [itemTemplate]="groupItemTpl"
  (createRequested)="openCreateForm()"
>
  @if (backLabel(); as label) {
    <button toolbar-start class="user-group-list__back" type="button" (click)="onBack()">&#8592; {{ label }}</button>
  } @else if (namespaces(); as namespaceOptions) {
    <agentos-namespace-select
      toolbar-start
      [namespaces]="namespaceOptions"
      [value]="namespaceId()"
      (valueChange)="onNamespaceChange($event)"
    />
  }
</ds-entity-list>

<!-- Item template: renders UserGroupItemComponent for each entity-list card slot -->
<ng-template #groupItemTpl let-item>
  @if (resolveGroup(item.id); as group) {
    <agentos-user-group-item
      [userGroup]="group"
      [namespaceId]="namespaceId()"
      [returnTo]="returnTo()"
      (deleteRequested)="deleteGroup($event)"
    />
  }
</ng-template>
