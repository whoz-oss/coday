<ds-entity-list
  title="LLM Models"
  [items]="(modelItems$ | async) ?? []"
  [showCreate]="true"
  emptyMessage="No LLM models configured yet. Add one above."
  cardMinWidth="400px"
  [itemTemplate]="llmModelItemTpl"
  (createRequested)="openCreateForm()"
>
  <button toolbar-start class="namespace-llm-models__back" type="button" (click)="goBack()">&#8592; Namespaces</button>
</ds-entity-list>

<!-- Item template: renders LlmModelConfigItemComponent for each entity-list card slot -->
<ng-template #llmModelItemTpl let-item>
  @if (resolveModel(item.id); as model) {
    <agentos-llm-model-config-item
      [model]="model"
      [namespaceId]="namespaceId"
      (deleteRequested)="deleteModel($event)"
    />
  }
</ng-template>
