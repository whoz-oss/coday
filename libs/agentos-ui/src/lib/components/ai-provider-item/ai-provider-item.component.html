<div class="ai-provider-item" role="listitem">
  <div class="ai-provider-item__body">
    <div class="ai-provider-item__heading">
      <span class="ai-provider-item__name">{{ config().name }}</span>
      <span class="ai-provider-item__badge" [attr.data-variant]="badge().variant" [attr.aria-label]="badge().ariaLabel">
        {{ badge().label }}
      </span>
    </div>
    <span class="ai-provider-item__type">{{ config().apiType }}</span>
    @if (config().baseUrl) {
      <span class="ai-provider-item__url">{{ config().baseUrl }}</span>
    }
  </div>

  <div class="ai-provider-item__actions">
    @if (pendingDelete()) {
      <span class="ai-provider-item__confirm-label">Delete?</span>
      <ds-icon-button icon="check" variant="danger" title="Confirm deletion" (action)="onDeleteConfirmed()" />
      <ds-icon-button icon="close" title="Cancel deletion" (action)="onDeleteCancelled()" />
    } @else {
      @if (canOverride()) {
        <ds-icon-button icon="content_copy" title="Override for me" (action)="onOverride()" />
      }
      @if (!readOnly()) {
        <ds-kebab-menu [items]="menuItems()" (itemSelected)="onMenuAction($event)" />
      }
    }
  </div>
</div>
