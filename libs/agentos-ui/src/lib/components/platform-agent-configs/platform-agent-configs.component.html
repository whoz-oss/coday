<ds-entity-list
  title="Platform Agent Configs"
  [items]="(configItems$ | async) ?? []"
  [showCreate]="true"
  emptyMessage="No platform agent configs defined yet. Add one above."
  cardMinWidth="400px"
  [itemTemplate]="agentConfigItemTpl"
  (createRequested)="openCreateForm()"
>
  <button toolbar-start class="platform-agent-configs__back" type="button" (click)="goBack()">&#8592; Admin</button>
</ds-entity-list>

<!-- Item template: renders AgentConfigItemComponent for each entity-list card slot -->
<ng-template #agentConfigItemTpl let-item>
  @if (resolveConfig(item.id); as config) {
    <agentos-agent-config-item [config]="config" [platformMode]="true" (deleteRequested)="deleteConfig($event)" />
  }
</ng-template>
