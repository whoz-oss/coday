<ds-entity-list
  title="Platform AI Models"
  [items]="(modelItems$ | async) ?? []"
  [showCreate]="true"
  emptyMessage="No platform AI models defined yet. Add one above."
  cardMinWidth="400px"
  [itemTemplate]="aiModelItemTpl"
  (createRequested)="openCreateForm()"
>
  <button toolbar-start class="platform-ai-models__back" type="button" (click)="goBack()">&#8592; Admin</button>
</ds-entity-list>

<!-- Item template: renders AiModelItemComponent for each entity-list card slot -->
<ng-template #aiModelItemTpl let-item>
  @if (resolveModel(item.id); as model) {
    <agentos-ai-model-item [model]="model" (editRequested)="onEdit($event)" (deleteRequested)="deleteModel($event)" />
  }
</ng-template>
