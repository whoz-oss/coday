<ds-entity-list
  title="Platform Integration Configs"
  [items]="(configItems$ | async) ?? []"
  [showCreate]="true"
  emptyMessage="No platform integration configs defined yet. Add one above."
  cardMinWidth="400px"
  [itemTemplate]="integrationConfigItemTpl"
  (createRequested)="openCreateForm()"
>
  <ds-icon-button toolbar-start icon="arrow_back" title="Back" (action)="goBack()" />
</ds-entity-list>

<!-- Item template: renders IntegrationConfigItemComponent for each entity-list card slot -->
<ng-template #integrationConfigItemTpl let-item>
  @if (resolveConfig(item.id); as config) {
    <agentos-integration-config-item
      [config]="config"
      scope="platform"
      (editRequested)="onEdit($event)"
      (deleteRequested)="deleteConfig($event)"
    />
  }
</ng-template>
