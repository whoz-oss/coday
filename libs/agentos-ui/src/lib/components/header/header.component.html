<header class="header">
  <button class="header__brand" type="button" title="Home" (click)="navigateHome()">
    <img src="CODAY-Logo.png" alt="Coday" class="header__logo-img" />
    <span class="header__logo-text">Coday</span>
  </button>
  <nav class="header__nav">
    <agentos-backend-status />
    @if (isAdmin()) {
      <button class="header__admin-btn" type="button" title="Admin" (click)="navigateToAdmin()">
        <span class="header__admin-icon">&#9881;&#65039;</span>
      </button>
    }
    <button
      class="header__user-btn"
      type="button"
      [class.header__user-btn--active]="isOnProfilePage()"
      [title]="isOnProfilePage() ? 'Back' : 'My profile'"
      (click)="toggleProfile()"
    >
      @if (userInitials()) {
        <span class="header__user-initials">{{ userInitials() }}</span>
      } @else {
        <span class="header__user-icon">&#9711;</span>
      }
    </button>
  </nav>
</header>
