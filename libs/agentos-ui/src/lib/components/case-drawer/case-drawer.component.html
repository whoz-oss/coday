<ds-entity-list
  title="Cases"
  [items]="caseItems"
  [itemTemplate]="caseItemTpl"
  [showCreate]="true"
  emptyMessage="No cases yet. Start one below."
  searchPlaceholder="Filter cases…"
  cardMinWidth="220px"
  contentMaxWidth="100%"
  (createRequested)="onCreateRequested()"
>
  <!-- Inject the close button into the toolbar-start slot, before the title -->
  <ds-icon-button
    toolbar-start
    icon="chevron_left"
    variant="default"
    title="Close drawer"
    (action)="closeRequested.emit()"
  />
</ds-entity-list>

<!-- Minimal case item template: single-line row, active highlight, delete action -->
<ng-template #caseItemTpl let-item>
  <div class="case-drawer-item" [class.case-drawer-item--active]="item.id === activeCaseId">
    <button type="button" class="case-drawer-item__select" (click)="onItemSelected(item.id)">
      <span class="case-drawer-item__name">{{ item.name }}</span>
    </button>
    <ds-icon-button
      class="case-drawer-item__star"
      [icon]="item.favorite ? 'star' : 'star_border'"
      [variant]="item.favorite ? 'primary' : 'default'"
      [title]="item.favorite ? 'Unstar case' : 'Star case'"
      (action)="onStarToggled(item)"
    />
    <ds-icon-button
      class="case-drawer-item__delete"
      icon="delete"
      variant="danger"
      title="Delete case"
      (action)="onDeleteRequested(item.id)"
    />
  </div>
</ng-template>
