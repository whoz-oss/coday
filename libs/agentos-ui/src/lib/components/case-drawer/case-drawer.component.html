<div class="case-drawer">
  @for (item of caseItems(); track item.id) {
    <div
      class="case-card"
      [class.case-card--active]="item.id === activeCaseId()"
      tabindex="0"
      role="button"
      (click)="onItemSelected(item.id)"
      (keyup.enter)="onItemSelected(item.id)"
    >
      <!-- Single row: dot + title + status label -->
      <div class="case-card__top">
        <span class="case-card__dot" [class]="'case-card__dot--' + item.status"></span>
        <div class="case-card__title">{{ item.name }}</div>
        <span class="case-card__status-label" [class]="'case-card__status-label--' + item.status">{{
          item.statusLabel
        }}</span>
      </div>

      <!-- Expand panel — visible on hover / active via CSS only -->
      <div class="case-card__expand">
        <div class="case-card__expand-inner">
          <!-- Meta: date -->
          @if (item.timeAgo) {
            <div class="case-card__meta">{{ item.timeAgo }}</div>
          }

          <!-- Action buttons -->
          <div class="case-card__expand-actions">
            <button
              class="case-card__expand-btn case-card__expand-btn--interrupt"
              type="button"
              [disabled]="!item.canInterrupt"
              (click)="onStop($event, item.id)"
            >
              Interrupt
            </button>

            <button
              class="case-card__expand-btn case-card__expand-btn--kill"
              type="button"
              [disabled]="!item.canKill"
              (click)="onKill($event, item.id)"
            >
              Kill
            </button>

            @if (pendingDeleteId() === item.id) {
              <button
                class="case-card__expand-btn case-card__expand-btn--confirm"
                type="button"
                title="Confirmer la suppression"
                (click)="onDeleteConfirm($event, item.id)"
              >
                &#10003;
              </button>
              <button
                class="case-card__expand-btn case-card__expand-btn--cancel"
                type="button"
                title="Annuler"
                (click)="onDeleteCancel($event)"
              >
                &#10005;
              </button>
            } @else {
              <button
                class="case-card__expand-btn case-card__expand-btn--delete"
                type="button"
                [disabled]="!item.canDelete"
                (click)="onDeleteArm($event, item.id)"
              >
                Delete
              </button>
            }
          </div>
        </div>
      </div>
    </div>
  }
</div>
