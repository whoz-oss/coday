<ds-entity-list
  title="Cases"
  [items]="rootItems"
  [itemTemplate]="caseItemTpl"
  [showCreate]="true"
  emptyMessage="No cases yet. Start one below."
  searchPlaceholder="Filter cases…"
  cardMinWidth="220px"
  contentMaxWidth="100%"
  (itemSelected)="onItemSelected($event)"
  (createRequested)="onCreateRequested()"
>
</ds-entity-list>

<!--
  Item template: renders one CaseTreeItem row + its children recursively.
  The recursive sub-tree template is defined alongside and referenced by name.
-->
<ng-template #caseItemTpl let-item>
  <ng-container *ngTemplateOutlet="caseRowTpl; context: { node: item, depth: 0 }" />
</ng-template>

<!-- Recursive row template -->
<ng-template #caseRowTpl let-node="node" let-depth="depth">
  <div class="case-tree-node" [style.--depth]="depth">
    <button
      type="button"
      class="case-tree-node__row"
      [class.case-tree-node__row--active]="node.id === activeCaseId"
      (click)="onItemSelected(node.id)"
    >
      <span class="case-tree-node__expand-slot">
        @if (node.children.length) {
          <button
            type="button"
            class="case-tree-node__toggle"
            [title]="isExpanded(node.id) ? 'Collapse' : 'Expand'"
            (click)="toggleExpand($event, node.id)"
          >
            <span class="case-tree-node__toggle-icon" [class.case-tree-node__toggle-icon--open]="isExpanded(node.id)"
              >&rsaquo;</span
            >
          </button>
        }
      </span>
      <span class="case-tree-node__name">{{ node.name }}</span>
    </button>

    @if (isExpanded(node.id) && node.children.length) {
      @for (child of node.children; track child.id) {
        <ng-container *ngTemplateOutlet="caseRowTpl; context: { node: child, depth: depth + 1 }" />
      }
    }
  </div>
</ng-template>
