<ds-entity-list
  title="Prompts"
  [items]="(promptItems$ | async) ?? []"
  [showCreate]="true"
  emptyMessage="No prompts defined yet. Add one above."
  cardMinWidth="400px"
  [itemTemplate]="promptItemTpl"
  (createRequested)="openCreateForm()"
>
  <button toolbar-start class="namespace-prompts__back" type="button" (click)="goBack()">&#8592; Namespaces</button>
</ds-entity-list>

<!-- Item template: renders PromptItemComponent for each entity-list card slot -->
<ng-template #promptItemTpl let-item>
  @if (resolvePrompt(item.id); as prompt) {
    <agentos-prompt-item
      [prompt]="prompt"
      [namespaceId]="namespaceId"
      [readOnly]="isPlatformPrompt(item.id)"
      (deleteRequested)="deletePrompt($event)"
    />
  }
</ng-template>
