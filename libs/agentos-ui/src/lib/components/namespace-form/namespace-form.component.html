<div class="namespace-form">
  <header class="namespace-form__header">
    <button class="namespace-form__back" type="button" (click)="cancel()" title="Back to namespaces">
      <span class="namespace-form__back-icon">&#8592;</span>
      Namespaces
    </button>
    <h1 class="namespace-form__title">{{ isEditMode() ? 'Edit namespace' : 'New namespace' }}</h1>
  </header>

  @if (isLoading()) {
    <p class="namespace-form__loading">Loading&hellip;</p>
  } @else {
    <form class="namespace-form__form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="namespace-form__field">
        <label class="namespace-form__label" for="ns-name">Name <span aria-hidden="true">*</span></label>
        <input
          id="ns-name"
          class="namespace-form__input"
          type="text"
          placeholder="Namespace name"
          [formControl]="nameControl"
          autocomplete="off"
        />
      </div>

      <div class="namespace-form__field">
        <label class="namespace-form__label" for="ns-description">Description</label>
        <textarea
          id="ns-description"
          class="namespace-form__textarea"
          rows="4"
          placeholder="Optional description"
          [formControl]="descriptionControl"
        ></textarea>
      </div>

      <div class="namespace-form__field">
        <label class="namespace-form__label" for="ns-external-id">External ID</label>
        <input
          id="ns-external-id"
          class="namespace-form__input"
          type="text"
          placeholder="Optional federation ID from an external system"
          [formControl]="externalIdControl"
          autocomplete="off"
        />
      </div>

      <div class="namespace-form__field">
        <label class="namespace-form__label" for="ns-default-agent">Default agent</label>
        <input
          id="ns-default-agent"
          class="namespace-form__input"
          type="text"
          placeholder="Logical name of the default agent (e.g. coday)"
          [formControl]="defaultAgentNameControl"
          autocomplete="off"
        />
      </div>

      <div class="namespace-form__field">
        <label class="namespace-form__label" for="ns-config-path">Config path</label>
        <input
          id="ns-config-path"
          class="namespace-form__input"
          type="text"
          placeholder="Optional path to base configuration directory"
          [formControl]="configPathControl"
          autocomplete="off"
        />
      </div>

      <div class="namespace-form__actions">
        <button
          class="namespace-form__btn namespace-form__btn--primary"
          type="submit"
          [disabled]="nameControl.invalid || isSubmitting()"
        >
          {{ isEditMode() ? 'Save changes' : 'Create' }}
        </button>
        <button class="namespace-form__btn" type="button" (click)="cancel()">Cancel</button>
      </div>
    </form>
  }
</div>
