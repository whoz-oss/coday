<div class="shell-topbar">
  <!-- Logo -->
  <button class="shell-topbar__brand" type="button" title="Home" (click)="navigateHome()">
    <img src="CODAY-Logo.png" alt="Coday" class="shell-topbar__logo-img" />
    <span class="shell-topbar__logo-text">Coday</span>
  </button>

  <!-- User menu -->
  <div class="shell-topbar__user-menu">
    <button class="shell-topbar__user-btn" type="button" title="Menu" (click)="toggleMenu($event)">
      @if (userInitials()) {
        {{ userInitials() }}
      } @else {
        &bull;&bull;&bull;
      }
    </button>

    <agentos-shell-user-menu
      [open]="menuOpen()"
      [isAdmin]="isAdmin()"
      [isDark]="isDark()"
      [showTechnical]="showTechnical()"
      variant="topbar"
      (navigateTo)="onNavigate($event)"
      (themeToggled)="onThemeToggle()"
      (logsToggled)="onLogsToggle()"
      (closed)="closeMenu($event)"
    />
  </div>
</div>
