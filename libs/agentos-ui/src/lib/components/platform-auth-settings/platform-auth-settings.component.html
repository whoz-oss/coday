<ds-entity-list
  title="Platform Auth Settings"
  [items]="(settingItems$ | async) ?? []"
  [showCreate]="true"
  emptyMessage="No platform auth settings defined yet. Add one above."
  cardMinWidth="400px"
  [itemTemplate]="authSettingItemTpl"
  (createRequested)="openCreateForm()"
>
  <button toolbar-start class="platform-auth-settings__back" type="button" (click)="goBack()">&#8592; Admin</button>
</ds-entity-list>

<!-- Item template: renders AuthSettingItemComponent for each entity-list card slot -->
<ng-template #authSettingItemTpl let-item>
  @if (resolveSetting(item.id); as setting) {
    <agentos-auth-setting-item
      [config]="setting"
      scope="namespace"
      [showBadge]="false"
      (editRequested)="onEdit($event)"
      (deleteRequested)="onDelete($event)"
    />
  }
</ng-template>
