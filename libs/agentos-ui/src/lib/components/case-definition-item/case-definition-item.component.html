<div class="case-definition-item" role="listitem">
  <div class="case-definition-item__body">
    <div class="case-definition-item__header">
      <span class="case-definition-item__name">{{ definition().name }}</span>
      <span
        class="case-definition-item__status"
        [class.case-definition-item__status--enabled]="definition().enabled"
        [class.case-definition-item__status--disabled]="!definition().enabled"
      >
        {{ definition().enabled ? 'Enabled' : 'Disabled' }}
      </span>
    </div>
    @if (definition().description) {
      <span class="case-definition-item__description">{{ definition().description }}</span>
    }
    <span class="case-definition-item__schedule">{{ scheduleLabel }}</span>
  </div>

  @if (!readOnly()) {
    <div class="case-definition-item__actions" [class.case-definition-item__actions--confirming]="pendingDelete()">
      @if (pendingDelete()) {
        <span class="case-definition-item__confirm-label">Delete?</span>
        <ds-icon-button icon="check" variant="danger" title="Confirm deletion" (action)="onDeleteConfirmed()" />
        <ds-icon-button icon="close" title="Cancel deletion" (action)="onDeleteCancelled()" />
      } @else {
        <ds-kebab-menu [items]="menuItems" (itemSelected)="onMenuAction($event)" />
      }
    </div>
  }
</div>
