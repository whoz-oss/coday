<ds-entity-list
  title="Schedules"
  [items]="(scheduleItems$ | async) ?? []"
  [showCreate]="true"
  emptyMessage="No schedules configured yet. Add one above."
  cardMinWidth="400px"
  [itemTemplate]="scheduleItemTpl"
  (createRequested)="openCreateForm()"
>
  <ds-icon-button toolbar-start icon="arrow_back" title="Back" (action)="goBack()" />
</ds-entity-list>

<!-- Item template: renders ScheduleItemComponent for each entity-list card slot -->
<ng-template #scheduleItemTpl let-item>
  @if (resolveSchedule(item.id); as schedule) {
    <agentos-schedule-item
      [schedule]="schedule"
      [namespaceId]="namespaceId"
      (deleteRequested)="deleteSchedule($event)"
    />
  }
</ng-template>
