<div class="case-chat">
  <div class="case-chat__messages">
    @if (messages().length === 0) {
      <div class="case-chat__empty">
        <p>No messages yet.</p>
      </div>
    } @else {
      @for (msg of messages(); track msg.id) {
        <div
          class="case-chat__message"
          [class.case-chat__message--user]="msg.actor?.role === 'USER'"
          [class.case-chat__message--agent]="msg.actor?.role === 'AGENT'"
        >
          <span class="case-chat__message-author">{{ msg.actor?.displayName }}</span>
          <p class="case-chat__message-text">{{ extractText(msg) }}</p>
        </div>
      }
    }

    @if (isRunning()) {
      <div class="case-chat__thinking">
        <span class="thinking-dot"></span>
        <span class="thinking-dot"></span>
        <span class="thinking-dot"></span>
      </div>
    }
  </div>

  <div class="case-chat__composer">
    <textarea
      class="case-chat__input"
      placeholder="Reply…"
      rows="3"
      [value]="inputValue()"
      [disabled]="isRunning()"
      (input)="onInput($event)"
      (keydown)="onKeydown($event)"
    ></textarea>
    <div class="case-chat__actions">
      @if (isRunning()) {
        <ds-icon-button icon="stop" variant="danger" title="Stop" (action)="stop()" />
      } @else {
        <ds-icon-button icon="send" variant="primary" title="Send (Enter)" [disabled]="!canSend" (action)="submit()" />
      }
    </div>
  </div>
</div>
