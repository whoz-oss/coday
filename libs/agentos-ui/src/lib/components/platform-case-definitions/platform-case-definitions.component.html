<ds-entity-list
  title="Platform Case Definitions"
  [items]="(definitionItems$ | async) ?? []"
  [showCreate]="true"
  emptyMessage="No platform case definitions defined yet. Add one above."
  cardMinWidth="420px"
  [itemTemplate]="caseDefinitionItemTpl"
  (createRequested)="openCreateForm()"
>
  <ds-icon-button toolbar-start icon="arrow_back" title="Back" (action)="goBack()" />
</ds-entity-list>

<!-- Item template: renders CaseDefinitionItemComponent for each entity-list card slot -->
<ng-template #caseDefinitionItemTpl let-item>
  @if (resolveDefinition(item.id); as definition) {
    <agentos-case-definition-item
      [definition]="definition"
      [platformMode]="true"
      (toggleRequested)="toggleDefinition($event)"
      (deleteRequested)="deleteDefinition($event)"
    />
  }
</ng-template>
