<ds-entity-list
  title="Users"
  [hideTitle]="hideTitle()"
  [items]="userItems()"
  [showCreate]="true"
  emptyMessage="No users found."
  cardMinWidth="320px"
  [itemTemplate]="userItemTpl"
  (createRequested)="navigateToCreate()"
>
  @if (namespaces(); as namespaceOptions) {
    <agentos-namespace-select
      toolbar-start
      [namespaces]="namespaceOptions"
      [value]="selectedNamespaceId()"
      [includeAllOption]="true"
      (valueChange)="onNamespaceChange($event)"
    />
  } @else if (showBackButton()) {
    <ds-icon-button toolbar-start icon="arrow_back" title="Back" (action)="goBack()" />
  }
</ds-entity-list>

<!-- Item template: renders UserItemComponent for each entity-list card slot -->
<ng-template #userItemTpl let-item>
  @if (resolveUser(item.id); as user) {
    <agentos-user-item [user]="user" (editRequested)="navigateToEdit($event)" (deleteRequested)="deleteUser($event)" />
  }
</ng-template>
