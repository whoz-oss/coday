  /api/ai-providers:
    get:
      tags:
      - ai-provider-controller
      summary: List AiProviders by scope
      description: |-
        Scope is inferred from the query params:

        | query                            | mode             | required permission                            |
        |----------------------------------|------------------|------------------------------------------------|
        | (no params)                      | platform         | authenticated                                  |
        | `?namespaceId=<uuid>`            | NS-shared        | READ on the namespace (empty list if missing)  |
        | `?namespaceId=<uuid>&userId=me`  | user × namespace | authenticated                                  |
        | `?namespaceId=none&userId=me`    | user-global      | authenticated                                  |
        | `?userId=me` (no namespace)      | all caller's     | authenticated                                  |

        `userId` accepts ONLY the literal sentinel `me` — a UUID returns 400. `namespaceId=none` is the sentinel for `namespaceId IS NULL` (listing is not exposed, mass-assignment guard, AC4).
      operationId: listAiProvider
      parameters:
      - name: namespaceId
        in: query
        required: false
        schema:
          type: string
      - name: userId
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiProvider"
    post:
      tags:
      - ai-provider-controller
      summary: Create an AiProvider
      description: |-
        Scope is inferred implicitly from the body's `(namespaceId, userId)` pair :

        | body.namespaceId | body.userId        | scope         | required permission                  |
        |------------------|--------------------|---------------|--------------------------------------|
        | null             | null               | platform      | super-admin only                     |
        | present          | null               | NS-shared     | WRITE on the namespace               |
        | null             | <currentUser.id>   | user-global   | authenticated only                   |
        | present          | <currentUser.id>   | user×namespace| READ on the namespace                |

        `body.userId` (when supplied) MUST equal the authenticated user's id — sending a different user-id is rejected with 400 (mass-assignment guard, Decision 15 / AC2-AC3). A `namespaceId` that does not exist returns 404 (Decision 15 / AC7).
      operationId: createAiProvider
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiProvider"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiProvider"
