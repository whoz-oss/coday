openapi: 3.1.0
info:
  title: AgentOS API
  description: REST API for AgentOS — orchestration of AI agents via plugins
  version: 0.0.1
servers:
- url: http://localhost:8123
  description: Generated server url
tags:
- name: sse
  description: "Server-Sent Events endpoints — use EventSource API, not HTTP client"
paths:
  /api/namespaces/{id}:
    get:
      tags:
      - namespace-controller
      operationId: getById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Namespace"
    put:
      tags:
      - namespace-controller
      operationId: update
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Namespace"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Namespace"
    delete:
      tags:
      - namespace-controller
      operationId: delete
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: No Content
  /api/cases/{id}:
    get:
      tags:
      - case-controller
      operationId: getById_1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
    put:
      tags:
      - case-controller
      operationId: update_1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Case"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
    delete:
      tags:
      - case-controller
      operationId: delete_1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: No Content
  /api/tools/{toolName}/execute:
    post:
      tags:
      - tool-controller
      operationId: executeTool
      parameters:
      - name: toolName
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ToolExecutionResult"
  /api/plugins/{pluginId}/stop:
    post:
      tags:
      - plugin-controller
      operationId: stopPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/{pluginId}/start:
    post:
      tags:
      - plugin-controller
      operationId: startPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/{pluginId}/reload:
    post:
      tags:
      - plugin-controller
      operationId: reloadPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/upload:
    post:
      tags:
      - plugin-controller
      operationId: uploadPlugin
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginUploadResponse"
  /api/plugins/reload-agents:
    post:
      tags:
      - plugin-controller
      operationId: reloadAllAgents
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/namespaces:
    get:
      tags:
      - namespace-controller
      operationId: listAll
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Namespace"
    post:
      tags:
      - namespace-controller
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Namespace"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Namespace"
  /api/namespaces/by-ids:
    post:
      tags:
      - namespace-controller
      operationId: getByIds
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Namespace"
  /api/cases:
    post:
      tags:
      - case-controller
      operationId: create_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Case"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
  /api/cases/{caseId}/stop:
    post:
      tags:
      - case-controller
      operationId: stopCase
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
  /api/cases/{caseId}/messages:
    post:
      tags:
      - case-controller
      operationId: addMessage
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMessageRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/cases/{caseId}/kill:
    post:
      tags:
      - case-controller
      operationId: killCase
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
  /api/cases/by-ids:
    post:
      tags:
      - case-controller
      operationId: getByIds_1
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Case"
  /api/case-events/by-ids:
    post:
      tags:
      - case-event-rest-controller
      operationId: getByIds_2
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                  - $ref: "#/components/schemas/AgentFinishedEvent"
                  - $ref: "#/components/schemas/AgentRunningEvent"
                  - $ref: "#/components/schemas/AgentSelectedEvent"
                  - $ref: "#/components/schemas/AnswerEvent"
                  - $ref: "#/components/schemas/CaseStatusEvent"
                  - $ref: "#/components/schemas/IntentionGeneratedEvent"
                  - $ref: "#/components/schemas/MessageEvent"
                  - $ref: "#/components/schemas/QuestionEvent"
                  - $ref: "#/components/schemas/TextChunkEvent"
                  - $ref: "#/components/schemas/ThinkingEvent"
                  - $ref: "#/components/schemas/ToolRequestEvent"
                  - $ref: "#/components/schemas/ToolResponseEvent"
                  - $ref: "#/components/schemas/ToolSelectedEvent"
                  - $ref: "#/components/schemas/WarnEvent"
  /api/tools:
    get:
      tags:
      - tool-controller
      operationId: listTools
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolOutput"
  /api/tools/{toolName}:
    get:
      tags:
      - tool-controller
      operationId: getTool
      parameters:
      - name: toolName
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ToolOutput"
  /api/plugins:
    get:
      tags:
      - plugin-controller
      operationId: getAllPlugins
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PluginInfo"
  /api/plugins/{pluginId}:
    get:
      tags:
      - plugin-controller
      operationId: getPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginInfo"
    delete:
      tags:
      - plugin-controller
      operationId: unloadPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/{pluginId}/debug:
    get:
      tags:
      - plugin-controller
      operationId: debugPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/debug:
    get:
      tags:
      - plugin-controller
      operationId: debugAllPlugins
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/namespaces/by-parentId/{parentId}:
    get:
      tags:
      - namespace-controller
      operationId: listByParent
      parameters:
      - name: parentId
        in: path
        description: Parent entity ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Namespace"
  /api/cases/{caseId}/events:
    get:
      tags:
      - sse
      summary: Stream case events via SSE
      description: "Server-Sent Events stream emitting all events generated during\
        \ case execution. Use the browser EventSource API to consume this endpoint,\
        \ not a regular HTTP client."
      operationId: streamEvents
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: "SSE stream — each event is a JSON-serialized CaseEvent subtype\
            \ (MessageEvent, ToolRequestEvent, etc.) with a \"type\" discriminant\
            \ field."
          content:
            text/event-stream: {}
  /api/cases/by-parentId/{parentId}:
    get:
      tags:
      - case-controller
      operationId: listByParent_1
      parameters:
      - name: parentId
        in: path
        description: Parent entity ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Case"
  /api/case-events/{id}:
    get:
      tags:
      - case-event-rest-controller
      operationId: getById_2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/AgentFinishedEvent"
                - $ref: "#/components/schemas/AgentRunningEvent"
                - $ref: "#/components/schemas/AgentSelectedEvent"
                - $ref: "#/components/schemas/AnswerEvent"
                - $ref: "#/components/schemas/CaseStatusEvent"
                - $ref: "#/components/schemas/IntentionGeneratedEvent"
                - $ref: "#/components/schemas/MessageEvent"
                - $ref: "#/components/schemas/QuestionEvent"
                - $ref: "#/components/schemas/TextChunkEvent"
                - $ref: "#/components/schemas/ThinkingEvent"
                - $ref: "#/components/schemas/ToolRequestEvent"
                - $ref: "#/components/schemas/ToolResponseEvent"
                - $ref: "#/components/schemas/ToolSelectedEvent"
                - $ref: "#/components/schemas/WarnEvent"
  /api/case-events/by-parentId/{caseId}:
    get:
      tags:
      - case-event-rest-controller
      operationId: listByCase
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                  - $ref: "#/components/schemas/AgentFinishedEvent"
                  - $ref: "#/components/schemas/AgentRunningEvent"
                  - $ref: "#/components/schemas/AgentSelectedEvent"
                  - $ref: "#/components/schemas/AnswerEvent"
                  - $ref: "#/components/schemas/CaseStatusEvent"
                  - $ref: "#/components/schemas/IntentionGeneratedEvent"
                  - $ref: "#/components/schemas/MessageEvent"
                  - $ref: "#/components/schemas/QuestionEvent"
                  - $ref: "#/components/schemas/TextChunkEvent"
                  - $ref: "#/components/schemas/ThinkingEvent"
                  - $ref: "#/components/schemas/ToolRequestEvent"
                  - $ref: "#/components/schemas/ToolResponseEvent"
                  - $ref: "#/components/schemas/ToolSelectedEvent"
                  - $ref: "#/components/schemas/WarnEvent"
components:
  schemas:
    EntityMetadata:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created:
          type: string
          format: date-time
        createdBy:
          type: string
        modified:
          type: string
          format: date-time
        modifiedBy:
          type: string
        removed:
          type: boolean
      required:
      - created
      - id
      - modified
      - removed
    Namespace:
      type: object
      properties:
        metadata:
          $ref: "#/components/schemas/EntityMetadata"
        name:
          type: string
        description:
          type: string
        id:
          type: string
          format: uuid
      required:
      - id
      - metadata
      - name
    Case:
      type: object
      properties:
        metadata:
          $ref: "#/components/schemas/EntityMetadata"
        namespaceId:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - PENDING
          - RUNNING
          - STOPPING
          - ERROR
          - STOPPED
        id:
          type: string
          format: uuid
      required:
      - id
      - metadata
      - namespaceId
      - status
    ToolExecutionResult:
      type: object
      properties:
        toolName:
          type: string
        success:
          type: boolean
        output:
          type: string
        executionDurationMs:
          type: integer
          format: int64
        errorType:
          type: string
        errorMessage:
          type: string
      required:
      - executionDurationMs
      - output
      - success
      - toolName
    PluginActionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
      - message
      - success
    PluginUploadResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        pluginId:
          type: string
      required:
      - message
      - success
    AddMessageRequest:
      type: object
      properties:
        content:
          type: string
        userId:
          type: string
        answerToEventId:
          type: string
          format: uuid
      required:
      - content
      - userId
    Actor:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum:
          - USER
          - AGENT
      required:
      - displayName
      - id
      - role
    AgentFinishedEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          agentName:
            type: string
      required:
      - agentId
      - agentName
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    AgentRunningEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          agentName:
            type: string
      required:
      - agentId
      - agentName
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    AgentSelectedEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          agentName:
            type: string
      required:
      - agentId
      - agentName
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    AnswerEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          actor:
            $ref: "#/components/schemas/Actor"
          answer:
            type: string
          questionId:
            type: string
            format: uuid
      required:
      - actor
      - answer
      - caseId
      - id
      - metadata
      - namespaceId
      - questionId
      - timestamp
      - type
    CaseEvent:
      type: object
      discriminator:
        propertyName: type
      properties:
        caseId:
          type: string
          format: uuid
        id:
          type: string
          format: uuid
        metadata:
          $ref: "#/components/schemas/EntityMetadata"
        namespaceId:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        type:
          type: string
          enum:
          - CaseStatusEvent
          - AgentSelectedEvent
          - MessageEvent
          - ToolRequestEvent
          - ToolResponseEvent
          - ThinkingEvent
          - AgentFinishedEvent
          - AgentRunningEvent
          - WarnEvent
          - ErrorEvent
          - QuestionEvent
          - AnswerEvent
          - IntentionGeneratedEvent
          - ToolSelectedEvent
          - TextChunkEvent
      required:
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    CaseStatusEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          status:
            type: string
            enum:
            - PENDING
            - RUNNING
            - STOPPING
            - ERROR
            - STOPPED
      required:
      - caseId
      - id
      - metadata
      - namespaceId
      - status
      - timestamp
      - type
    Image:
      allOf:
      - $ref: "#/components/schemas/MessageContent"
      - type: object
        properties:
          content:
            type: string
          mimeType:
            type: string
          width:
            type: integer
            format: int32
          height:
            type: integer
            format: int32
      required:
      - content
      - mimeType
    IntentionGeneratedEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          intention:
            type: string
      required:
      - agentId
      - caseId
      - id
      - intention
      - metadata
      - namespaceId
      - timestamp
      - type
    MessageContent:
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
      required:
      - type
    MessageEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          actor:
            $ref: "#/components/schemas/Actor"
          content:
            type: array
            items:
              oneOf:
              - $ref: "#/components/schemas/Image"
              - $ref: "#/components/schemas/Text"
      required:
      - actor
      - caseId
      - content
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    QuestionEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          agentName:
            type: string
          options:
            type: array
            items:
              type: string
          question:
            type: string
      required:
      - agentId
      - agentName
      - caseId
      - id
      - metadata
      - namespaceId
      - question
      - timestamp
      - type
    Text:
      allOf:
      - $ref: "#/components/schemas/MessageContent"
      - type: object
        properties:
          content:
            type: string
      required:
      - content
    TextChunkEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          chunk:
            type: string
      required:
      - caseId
      - chunk
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    ThinkingEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      required:
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    ToolRequestEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          args:
            type: string
          toolName:
            type: string
          toolRequestId:
            type: string
      required:
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - toolName
      - toolRequestId
      - type
    ToolResponseEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          output:
            oneOf:
            - $ref: "#/components/schemas/Image"
            - $ref: "#/components/schemas/Text"
          success:
            type: boolean
          toolName:
            type: string
          toolRequestId:
            type: string
      required:
      - caseId
      - id
      - metadata
      - namespaceId
      - output
      - success
      - timestamp
      - toolName
      - toolRequestId
      - type
    ToolSelectedEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          toolName:
            type: string
      required:
      - agentId
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - toolName
      - type
    WarnEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          message:
            type: string
      required:
      - caseId
      - id
      - message
      - metadata
      - namespaceId
      - timestamp
      - type
    ToolOutput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        inputSchema:
          type: string
      required:
      - description
      - inputSchema
      - name
      - version
    PluginInfo:
      type: object
      properties:
        id:
          type: string
        version:
          type: string
        state:
