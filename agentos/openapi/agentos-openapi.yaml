                - $ref: "#/components/schemas/ToolSelectedEvent"
                - $ref: "#/components/schemas/WarnEvent"
  /api/case-events/by-parentId/{caseId}:
    get:
      tags:
      - case-event-rest-controller
      operationId: listByCaseCaseEventRest
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                  - $ref: "#/components/schemas/AgentFinishedEvent"
                  - $ref: "#/components/schemas/AgentRunningEvent"
                  - $ref: "#/components/schemas/AgentSelectedEvent"
                  - $ref: "#/components/schemas/AnswerEvent"
                  - $ref: "#/components/schemas/CaseStatusEvent"
                  - $ref: "#/components/schemas/CaseUpdatedEvent"
                  - $ref: "#/components/schemas/ConfirmationResolvedEvent"
                  - $ref: "#/components/schemas/ErrorEvent"
                  - $ref: "#/components/schemas/IntentionGeneratedEvent"
                  - $ref: "#/components/schemas/MessageEvent"
                  - $ref: "#/components/schemas/PendingConfirmationEvent"
                  - $ref: "#/components/schemas/QuestionEvent"
                  - $ref: "#/components/schemas/TextChunkEvent"
                  - $ref: "#/components/schemas/ThinkingEvent"
                  - $ref: "#/components/schemas/ToolRequestEvent"
                  - $ref: "#/components/schemas/ToolResponseEvent"
                  - $ref: "#/components/schemas/ToolSelectedEvent"
                  - $ref: "#/components/schemas/WarnEvent"
  /api/ai-models/platform:
    get:
      tags:
      - ai-model-controller
      operationId: listPlatformLevelAiModel
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiModel"
  /api/ai-models/by-parentId/{parentId}:
    get:
      tags:
      - ai-model-controller
      operationId: listByParentAiModel
      parameters:
      - name: parentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiModel"
  /api/ai-models/by-namespaceId/{namespaceId}:
    get:
      tags:
      - ai-model-controller
      operationId: listByNamespaceIdAiModel
      parameters:
      - name: namespaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiModel"
  /api/agent-configs/{id}/definition:
    get:
      tags:
      - agent-config-controller
      operationId: getDefinitionAgentConfig
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: withUserOverlay
        in: query
        required: false
        schema:
          type: boolean
          default: false
      - name: namespaceId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDefinition"
  /api/agent-configs/platform:
    get:
      tags:
      - agent-config-controller
      operationId: listPlatformAgentsAgentConfig
      parameters:
      - name: withDisabled
        in: query
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentConfig"
  /api/agent-configs/by-parentId/{parentId}:
    get:
      tags:
      - agent-config-controller
      operationId: listByParentAgentConfig
      parameters:
      - name: parentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: withDisabled
        in: query
        required: false
        schema:
          type: boolean
          default: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentConfig"
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        externalId:
          type: string
        firstname:
          type: string
        lastname:
          type: string
        bio:
          type: string
        isAdmin:
          type: boolean
      required:
      - isAdmin
    Prompt:
      type: object
      properties:
        id:
          type: string
          format: uuid
        namespaceId:
          type:
          - string
          - "null"
          format: uuid
        userId:
          type:
          - string
          - "null"
          format: uuid
        name:
          type: string
          minLength: 1
        description:
          type: string
        content:
          type: array
          items:
            type: string
            minLength: 1
          minItems: 1
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/PromptParameter"
        createdBy:
          type: string
        createdOn:
          type: string
          format: date-time
        updatedBy:
          type: string
        updatedOn:
          type: string
          format: date-time
      required:
      - content
      - name
      - parameters
    PromptParameter:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        defaultValue:
          type: string
          minLength: 1
      required:
      - defaultValue
      - name
    Namespace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        description:
          type: string
        configPath:
          type: string
          description: "Optional filesystem path to a directory containing base configuration\
            \ for this namespace (agents, tools, etc.)."
        externalId:
          type: string
          description: "Optional external identifier for this namespace, e.g. a federation\
            \ id from an external system"
        defaultAgentName:
          type: string
          description: "Logical name of the default agent for this namespace. Resolved\
            \ at runtime against AgentConfig entries (case-insensitive). When null,\
            \ messages without an @mention will produce an explicit error."
      required:
      - name
    IntegrationConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        namespaceId:
          type:
          - string
          - "null"
          format: uuid
        userId:
          type:
          - string
          - "null"
          format: uuid
        name:
          type: string
          minLength: 1
        integrationType:
          type: string
          minLength: 1
        description:
          type: string
        parameters:
          $ref: "#/components/schemas/JsonNode"
      required:
      - integrationType
      - name
    JsonNode: {}
    Case:
      type: object
      properties:
        id:
          type: string
          format: uuid
        namespaceId:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - PENDING
          - RUNNING
          - IDLE
          - KILLED
          - ERROR
        title:
          type: string
        parentCaseId:
          type: string
          format: uuid
        created:
          type: string
          format: date-time
        removed:
          type: boolean
      required:
      - namespaceId
      - removed
      - status
    AiProvider:
      type: object
      properties:
        id:
          type: string
          format: uuid
        namespaceId:
          type:
          - string
          - "null"
          format: uuid
        userId:
          type:
          - string
          - "null"
          format: uuid
        name:
          type: string
          minLength: 1
        description:
          type: string
        apiType:
          type: string
          enum:
          - OpenAI
          - Anthropic
          - Gemini
          - vLLM
          - Ollama
        baseUrl:
          type: string
        apiKey:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
      required:
      - apiType
      - name
    AiModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        aiProviderId:
          type: string
          format: uuid
        namespaceId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        apiModelName:
          type: string
          minLength: 1
        description:
          type: string
        alias:
          type: string
        priority:
          type: integer
          format: int32
        temperature:
          type: number
          format: double
        maxTokens:
          type: integer
          format: int32
      required:
      - aiProviderId
      - apiModelName
      - priority
    AgentConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        namespaceId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        description:
          type: string
        instructions:
          type: string
        modelName:
          type: string
        integrations:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        advancedExecution:
          type: boolean
        externalMetadata:
          type: object
          additionalProperties: {}
        createdBy:
          type: string
        createdOn:
          type: string
          format: date-time
        updatedBy:
          type: string
        updatedOn:
          type: string
          format: date-time
        enabled:
          type: boolean
        subAgents:
          type: array
          items:
            type: string
            description: "Glob patterns controlling which agents this agent may delegate\
              \ to. When null or empty, no delegation capability is provided. '*'\
              \ matches any sequence of characters (anchored, case-insensitive). Examples:\
              \ ['*'] allows all agents, ['*Fixer'] matches BugFixer/StoryFixer, ['Fixer*']\
              \ matches FixerHelper/FixerV2."
            minLength: 1
      required:
      - name
    GroupsByExternalIdsRequest:
      type: object
      properties:
        externalIds:
          type: array
          items:
            type: string
        namespaceId:
          type: string
          format: uuid
      required:
      - externalIds
    UserGroupSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
      required:
      - id
      - name
    GetByIdsRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
            format: uuid
        withRemoved:
          type: boolean
      required:
      - ids
      - withRemoved
    UserGroupCreateRequest:
      type: object
      properties:
        namespaceId:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 250
          minLength: 0
        userExternalIdsToAdd:
          type: array
          items:
            type: string
          maxItems: 200
          minItems: 0
          uniqueItems: true
        agentIds:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 200
          minItems: 0
          uniqueItems: true
      required:
      - agentIds
      - name
      - namespaceId
      - userExternalIdsToAdd
    UserGroupSearchResult:
      type: object
      properties:
        userGroupId:
          type: string
          format: uuid
        namespaceId:
          type: string
          format: uuid
        namespaceExternalId:
          type: string
        name:
          type: string
        agentIds:
          type: array
          items:
            type: string
            format: uuid
        userCount:
          type: integer
          format: int32
      required:
      - agentIds
      - name
      - namespaceExternalId
      - namespaceId
      - userCount
      - userGroupId
    UserGroupUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 250
          minLength: 0
        userExternalIdsToAdd:
          type: array
          items:
            type: string
          maxItems: 200
          minItems: 0
          uniqueItems: true
        userExternalIdsToRemove:
          type: array
          items:
            type: string
          maxItems: 200
          minItems: 0
          uniqueItems: true
        agentIds:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 200
          minItems: 0
          uniqueItems: true
      required:
      - agentIds
      - name
      - userExternalIdsToAdd
      - userExternalIdsToRemove
    PluginActionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
      - message
      - success
    PluginUploadResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        pluginId:
          type: string
      required:
      - message
      - success
    NamespaceAgentDeployRequest:
      type: object
      properties:
        agentIds:
          type: array
          items:
            type: string
            format: uuid
      required:
      - agentIds
    ExchangeFileEntry:
      type: object
      description: Metadata for a single file in an exchange scope.
      properties:
        path:
          type: string
          description: "Path of the file relative to its exchange root, using forward\
            \ slashes."
        filename:
          type: string
          description: File name (last path segment).
        size:
          type: integer
          format: int64
          description: File size in bytes.
        lastModified:
          type: string
          format: date-time
          description: Last modification timestamp.
        mimeType:
          type: string
          description: "Detected MIME type, or null if it could not be determined."
        scope:
          type: string
          description: Scope the file belongs to.
          enum:
          - CASE
          - NAMESPACE
        etag:
          type: string
          description: Opaque entity tag derived from size and last-modified time.
      required:
      - filename
      - lastModified
      - path
      - scope
      - size
    NamespaceRoleEntry:
      type: object
      properties:
        namespaceExternalId:
          type: string
          minLength: 1
        role:
          type: string
          pattern: ADMIN|MEMBER
      required:
      - namespaceExternalId
      - role
    SyncUserRolesRequest:
      type: object
      properties:
        userExternalId:
          type: string
          minLength: 1
        namespaceRoles:
          type: array
          items:
            $ref: "#/components/schemas/NamespaceRoleEntry"
      required:
      - namespaceRoles
      - userExternalId
    FeedbackInput:
      type: object
      properties:
        caseEventId:
          type: string
          format: uuid
        positive:
          type: boolean
        type:
          type: string
          description: Optional category label. Ignored (cleared) when positive=true.
        comment:
          type: string
          description: Optional free-text note. Ignored (cleared) when positive=true.
      required:
      - caseEventId
      - positive
    Feedback:
      type: object
      properties:
        id:
          type: string
          format: uuid
        namespaceId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        caseEventId:
          type: string
          format: uuid
        positive:
          type: boolean
        type:
          type: string
        comment:
          type: string
        createdBy:
          type: string
        createdOn:
          type: string
          format: date-time
        updatedBy:
          type: string
        updatedOn:
          type: string
          format: date-time
      required:
      - caseEventId
      - caseId
      - createdOn
      - id
      - namespaceId
      - positive
      - updatedOn
    AddMessageRequest:
      type: object
      properties:
        content:
          type: string
        answerToEventId:
          type: string
          format: uuid
        sessionContext:
          type: object
          additionalProperties: {}
      required:
      - content
    ListByUserInNamespaceRequest:
      type: object
      properties:
        userExternalId:
          type: string
        namespaceExternalId:
          type: string
      required:
      - namespaceExternalId
      - userExternalId
    Actor:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum:
          - USER
          - AGENT
      required:
      - displayName
      - id
      - role
    AgentFinishedEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          agentName:
            type: string
          llmModel:
            type: string
          llmProvider:
            type: string
      required:
      - agentId
      - agentName
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    AgentRunningEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          agentName:
            type: string
          llmModel:
            type: string
          llmProvider:
            type: string
      required:
      - agentId
      - agentName
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    AgentSelectedEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          agentName:
            type: string
      required:
      - agentId
      - agentName
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    AnswerEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          actor:
            $ref: "#/components/schemas/Actor"
          answer:
            type: string
          questionId:
            type: string
            format: uuid
      required:
      - actor
      - answer
      - caseId
      - id
      - metadata
      - namespaceId
      - questionId
      - timestamp
      - type
    CaseEvent:
      type: object
      discriminator:
        propertyName: type
      properties:
        caseId:
          type: string
          format: uuid
        id:
          type: string
          format: uuid
        metadata:
          $ref: "#/components/schemas/EntityMetadata"
        namespaceId:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        type:
          type: string
          enum:
          - CaseStatusEvent
          - AgentSelectedEvent
          - MessageEvent
          - ToolRequestEvent
          - ToolResponseEvent
          - ThinkingEvent
          - AgentFinishedEvent
          - AgentRunningEvent
          - WarnEvent
          - ErrorEvent
          - QuestionEvent
          - AnswerEvent
          - IntentionGeneratedEvent
          - ToolSelectedEvent
          - TextChunkEvent
          - PendingConfirmationEvent
          - ConfirmationResolvedEvent
          - CaseUpdatedEvent
      required:
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    CaseStatusEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          status:
            type: string
            enum:
            - PENDING
            - RUNNING
            - IDLE
            - KILLED
            - ERROR
      required:
      - caseId
      - id
      - metadata
      - namespaceId
      - status
      - timestamp
      - type
    CaseUpdatedEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          title:
            type: string
      required:
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    ConfirmationResolvedEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          confirmed:
            type: boolean
          pendingEventId:
            type: string
            format: uuid
          resultText:
            type: string
      required:
      - caseId
      - confirmed
      - id
      - metadata
      - namespaceId
      - pendingEventId
      - resultText
      - timestamp
      - type
    EnrichmentPhaseTrace:
      type: object
      properties:
        phaseIndex:
          type: integer
          format: int32
        prompt:
          type: string
        llmOutput:
          type: string
        enrichmentContent:
          type: string
        success:
          type: boolean
      required:
      - llmOutput
      - phaseIndex
      - prompt
      - success
    EntityMetadata:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created:
          type: string
          format: date-time
        createdBy:
          type: string
        modified:
          type: string
          format: date-time
        modifiedBy:
          type: string
        removed:
          type: boolean
      required:
      - created
      - id
      - modified
      - removed
    ErrorEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          message:
            type: string
      required:
      - caseId
      - id
      - message
      - metadata
      - namespaceId
      - timestamp
      - type
    Image:
      allOf:
      - $ref: "#/components/schemas/MessageContent"
      - type: object
        properties:
          content:
            type: string
          mimeType:
            type: string
          width:
            type: integer
            format: int32
          height:
            type: integer
            format: int32
      required:
      - content
      - mimeType
    IntentionGeneratedEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          intention:
            type: string
          isFailedIntention:
            type: boolean
          toolName:
            type: string
      required:
      - agentId
      - caseId
      - id
      - intention
      - isFailedIntention
      - metadata
      - namespaceId
      - timestamp
      - toolName
      - type
    MessageContent:
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
      required:
      - type
    MessageEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          actor:
            $ref: "#/components/schemas/Actor"
          content:
            type: array
            items:
              oneOf:
              - $ref: "#/components/schemas/Image"
              - $ref: "#/components/schemas/Text"
          sessionContext:
            type: object
            additionalProperties: {}
      required:
      - actor
      - caseId
      - content
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    PendingConfirmationEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          inputJson:
            type: string
          toolConfirmationInstructions:
            type: string
          toolName:
            type: string
          toolRequestId:
            type: string
      required:
      - caseId
      - id
      - inputJson
      - metadata
      - namespaceId
      - timestamp
      - toolConfirmationInstructions
      - toolName
      - toolRequestId
      - type
    QuestionEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          agentName:
            type: string
          options:
            type: array
            items:
              type: string
          question:
            type: string
      required:
      - agentId
      - agentName
      - caseId
      - id
      - metadata
      - namespaceId
      - question
      - timestamp
      - type
    Text:
      allOf:
      - $ref: "#/components/schemas/MessageContent"
      - type: object
        properties:
          content:
            type: string
      required:
      - content
    TextChunkEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          chunk:
            type: string
      required:
      - caseId
      - chunk
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    ThinkingEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      required:
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    ToolRequestEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          args:
            type: string
          enrichmentPhases:
            type: array
            items:
              $ref: "#/components/schemas/EnrichmentPhaseTrace"
          toolName:
            type: string
          toolRequestId:
            type: string
      required:
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - toolName
      - toolRequestId
      - type
    ToolResponseEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          durationMs:
            type: integer
            format: int64
          output:
            oneOf:
            - $ref: "#/components/schemas/Image"
            - $ref: "#/components/schemas/Text"
          success:
            type: boolean
          toolMetadata:
            type: object
            additionalProperties: {}
          toolName:
            type: string
          toolRequestId:
            type: string
      required:
      - caseId
      - id
      - metadata
      - namespaceId
      - output
      - success
      - timestamp
      - toolMetadata
      - toolName
      - toolRequestId
      - type
    ToolSelectedEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          toolName:
            type: string
      required:
      - agentId
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - toolName
      - type
    WarnEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          message:
            type: string
      required:
      - caseId
      - id
      - message
      - metadata
      - namespaceId
      - timestamp
      - type
    AgentConfigSearchRequest:
      type: object
      properties:
        namespaceId:
          type: string
          format: uuid
        userExternalId:
          type: string
          minLength: 1
        userId:
          type: string
      required:
      - namespaceId
      - userExternalId
    PluginInfo:
      type: object
      properties:
        id:
          type: string
        version:
          type: string
        state:
          type: string
          enum:
          - CREATED
          - DISABLED
          - RESOLVED
          - STARTED
          - STOPPED
          - FAILED
          - UNLOADED
        description:
          type: string
        provider:
          type: string
        agentCount:
          type: integer
          format: int32
        pluginPath:
          type: string
      required:
      - agentCount
      - description
      - id
      - pluginPath
      - provider
      - state
      - version
    NamespaceListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        configPath:
          type: string
        externalId:
          type: string
        defaultAgentName:
          type: string
        role:
          type: string
          description: The caller's effective role on this namespace.
          enum:
          - SUPER-ADMIN
          - ADMIN
          - MEMBER
      required:
      - id
      - name
      - role
    NamespaceUserListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        externalId:
          type: string
        email:
          type: string
        firstname:
          type: string
        lastname:
          type: string
        role:
          type: string
          description: The user's direct role on this namespace
          enum:
          - ADMIN
          - MEMBER
      required:
      - email
      - externalId
      - id
      - role
    ExchangeManifest:
      type: object
      description: Files in an exchange scope plus the caller's capability.
      properties:
        files:
          type: array
          description: Files available in the scope.
          items:
            $ref: "#/components/schemas/ExchangeFileEntry"
        capability:
          type: string
          description: Capability the caller has over this scope.
          enum:
          - NONE
          - READ
          - READ_WRITE
      required:
      - capability
      - files
    ExchangeFileContent:
      type: object
      description: Text content and metadata of a single exchange file.
      properties:
        content:
          type: string
          description: UTF-8 text content of the file.
        etag:
          type: string
          description: Opaque entity tag derived from size and last-modified time.
        mimeType:
          type: string
          description: "Detected MIME type, or null if it could not be determined."
        size:
          type: integer
          format: int64
          description: File size in bytes.
      required:
      - content
      - size
    IntegrationTypeDescriptor:
      type: object
      properties:
        type:
          type: string
        displayName:
          type: string
        description:
          type: string
        configSchema:
          $ref: "#/components/schemas/JsonNode"
      required:
      - description
      - displayName
      - type
    AgentDefinition:
      type: object
      properties:
        agentConfigId:
          type: string
          format: uuid
          description: The ID of the AgentConfig this definition was resolved from.
        name:
          type: string
          description: The agent's display name.
        systemPrompt:
          type: string
          description: "Privileged namespace context block sent as a separate system\
            \ message, before instructions. Null when no namespace context is available."
        instructions:
          type: string
          description: "Final system instructions sent to the LLM, including injected\
            \ namespace / integration / user context blocks."
        resolvedModelApiName:
          type: string
          description: The actual API model name sent to the provider.
        resolvedProviderName:
          type: string
          description: The name of the resolved AI provider.
        tools:
          type: array
          description: Summary of tools that would be made available to this agent.
          items:
            $ref: "#/components/schemas/AgentDefinitionToolSummary"
        advancedExecution:
          type: boolean
          description: Whether the agent uses the advanced multi-step execution engine.
        namespaceId:
          type: string
          format: uuid
          description: The namespace this agent belongs to.
        userId:
          type: string
          format: uuid
          description: "The user whose overlay was applied, or null for namespace-only\
            \ resolution."
      required:
      - advancedExecution
      - agentConfigId
      - name
      - namespaceId
      - resolvedModelApiName
      - resolvedProviderName
      - tools
    AgentDefinitionToolSummary:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        inputSchema:
          type: string
      required:
      - description
      - inputSchema
      - name
    ExchangeDeleteResponse:
      type: object
      description: Result of an exchange file deletion.
      properties:
        success:
          type: boolean
          description: Whether the deletion succeeded.
        message:
          type: string
          description: Human-readable outcome message.
      required:
      - message
      - success
