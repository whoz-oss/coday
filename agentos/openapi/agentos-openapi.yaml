openapi: 3.1.0
info:
  title: AgentOS API
  description: REST API for AgentOS — orchestration of AI agents via plugins
  version: 0.0.1
servers:
- url: http://localhost:8124
  description: Generated server url
tags:
- name: sse
  description: "Server-Sent Events endpoints — use EventSource API, not HTTP client"
paths:
  /api/users/{id}:
    get:
      tags:
      - user-controller
      operationId: getByIdUser
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      tags:
      - user-controller
      operationId: updateUser
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      tags:
      - user-controller
      operationId: deleteUser
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: No Content
  /api/namespaces/{id}:
    get:
      tags:
      - namespace-controller
      operationId: getByIdNamespace
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Namespace"
    put:
      tags:
      - namespace-controller
      operationId: updateNamespace
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Namespace"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Namespace"
    delete:
      tags:
      - namespace-controller
      operationId: deleteNamespace
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: No Content
  /api/integration-configs/{id}:
    get:
      tags:
      - integration-config-controller
      operationId: getByIdIntegrationConfig
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationConfig"
    put:
      tags:
      - integration-config-controller
      operationId: updateIntegrationConfig
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationConfig"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationConfig"
    delete:
      tags:
      - integration-config-controller
      operationId: deleteIntegrationConfig
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: No Content
  /api/cases/{id}:
    get:
      tags:
      - case-controller
      operationId: getByIdCase
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
    put:
      tags:
      - case-controller
      operationId: updateCase
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Case"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
    delete:
      tags:
      - case-controller
      operationId: deleteCase
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: No Content
  /api/users:
    get:
      tags:
      - user-controller
      operationId: listAllUser
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags:
      - user-controller
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /api/users/by-ids:
    post:
      tags:
      - user-controller
      operationId: getByIdsUser
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /api/plugins/{pluginId}/stop:
    post:
      tags:
      - plugin-controller
      operationId: stopPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/{pluginId}/start:
    post:
      tags:
      - plugin-controller
      operationId: startPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/{pluginId}/reload:
    post:
      tags:
      - plugin-controller
      operationId: reloadPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/upload:
    post:
      tags:
      - plugin-controller
      operationId: uploadPlugin
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginUploadResponse"
  /api/plugins/reload-agents:
    post:
      tags:
      - plugin-controller
      operationId: reloadAllAgentsPlugin
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/namespaces:
    get:
      tags:
      - namespace-controller
      operationId: listAllNamespace
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Namespace"
    post:
      tags:
      - namespace-controller
      operationId: createNamespace
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Namespace"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Namespace"
  /api/namespaces/by-ids:
    post:
      tags:
      - namespace-controller
      operationId: getByIdsNamespace
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Namespace"
  /api/integration-configs:
    post:
      tags:
      - integration-config-controller
      operationId: createIntegrationConfig
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationConfig"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationConfig"
  /api/integration-configs/by-ids:
    post:
      tags:
      - integration-config-controller
      operationId: getByIdsIntegrationConfig
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationConfig"
  /api/cases:
    post:
      tags:
      - case-controller
      operationId: createCase
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Case"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
  /api/cases/{caseId}/messages:
    post:
      tags:
      - case-controller
      operationId: addMessageCase
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMessageRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/cases/{caseId}/kill:
    post:
      tags:
      - case-controller
      operationId: killCase
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
  /api/cases/{caseId}/interrupt:
    post:
      tags:
      - case-controller
      operationId: interruptCase
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
  /api/cases/by-ids:
    post:
      tags:
      - case-controller
      operationId: getByIdsCase
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Case"
  /api/case-events/by-ids:
    post:
      tags:
      - case-event-rest-controller
      operationId: getByIdsCaseEventRest
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                  - $ref: "#/components/schemas/AgentFinishedEvent"
                  - $ref: "#/components/schemas/AgentRunningEvent"
                  - $ref: "#/components/schemas/AgentSelectedEvent"
                  - $ref: "#/components/schemas/AnswerEvent"
                  - $ref: "#/components/schemas/CaseStatusEvent"
                  - $ref: "#/components/schemas/IntentionGeneratedEvent"
                  - $ref: "#/components/schemas/MessageEvent"
                  - $ref: "#/components/schemas/QuestionEvent"
                  - $ref: "#/components/schemas/TextChunkEvent"
                  - $ref: "#/components/schemas/ThinkingEvent"
                  - $ref: "#/components/schemas/ToolRequestEvent"
                  - $ref: "#/components/schemas/ToolResponseEvent"
                  - $ref: "#/components/schemas/ToolSelectedEvent"
                  - $ref: "#/components/schemas/WarnEvent"
  /api/users/me:
    get:
      tags:
      - user-controller
      summary: Get the current user's profile
      operationId: getMeUser
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /api/users/by-parentId/{parentId}:
    get:
      tags:
      - user-controller
      operationId: listByParentUser
      parameters:
      - name: parentId
        in: path
        description: Parent entity ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /api/plugins:
    get:
      tags:
      - plugin-controller
      operationId: getAllPlugins
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PluginInfo"
  /api/plugins/{pluginId}:
    get:
      tags:
      - plugin-controller
      operationId: getPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginInfo"
    delete:
      tags:
      - plugin-controller
      operationId: unloadPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/{pluginId}/debug:
    get:
      tags:
      - plugin-controller
      operationId: debugPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/debug:
    get:
      tags:
      - plugin-controller
      operationId: debugAllPlugins
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/namespaces/by-parentId/{parentId}:
    get:
      tags:
      - namespace-controller
      operationId: listByParentNamespace
      parameters:
      - name: parentId
        in: path
        description: Parent entity ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Namespace"
  /api/integration-types:
    get:
      tags:
      - integration-type-controller
      operationId: listTypesIntegrationType
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationTypeDescriptor"
  /api/integration-types/{type}:
    get:
      tags:
      - integration-type-controller
      operationId: getTypeIntegrationType
      parameters:
      - name: type
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationTypeDescriptor"
  /api/integration-configs/by-parentId/{parentId}:
    get:
      tags:
      - integration-config-controller
      operationId: listByParentIntegrationConfig
      parameters:
      - name: parentId
        in: path
        description: Parent entity ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationConfig"
  /api/cases/{caseId}/events:
    get:
      tags:
      - sse
      summary: Stream case events via SSE
      description: "Server-Sent Events stream emitting all events generated during\
        \ case execution. Use the browser EventSource API to consume this endpoint,\
        \ not a regular HTTP client."
      operationId: streamEventsCaseEventSse
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: "SSE stream — each event is a JSON-serialized CaseEvent subtype\
            \ (MessageEvent, ToolRequestEvent, etc.) with a \"type\" discriminant\
            \ field."
          content:
            text/event-stream: {}
  /api/cases/by-parentId/{parentId}:
    get:
      tags:
      - case-controller
      operationId: listByParentCase
      parameters:
      - name: parentId
        in: path
        description: Parent entity ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Case"
  /api/case-events/{id}:
    get:
      tags:
      - case-event-rest-controller
      operationId: getByIdCaseEventRest
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/AgentFinishedEvent"
                - $ref: "#/components/schemas/AgentRunningEvent"
                - $ref: "#/components/schemas/AgentSelectedEvent"
                - $ref: "#/components/schemas/AnswerEvent"
                - $ref: "#/components/schemas/CaseStatusEvent"
                - $ref: "#/components/schemas/IntentionGeneratedEvent"
                - $ref: "#/components/schemas/MessageEvent"
                - $ref: "#/components/schemas/QuestionEvent"
                - $ref: "#/components/schemas/TextChunkEvent"
                - $ref: "#/components/schemas/ThinkingEvent"
                - $ref: "#/components/schemas/ToolRequestEvent"
                - $ref: "#/components/schemas/ToolResponseEvent"
                - $ref: "#/components/schemas/ToolSelectedEvent"
                - $ref: "#/components/schemas/WarnEvent"
  /api/case-events/by-parentId/{caseId}:
    get:
      tags:
      - case-event-rest-controller
      operationId: listByCaseCaseEventRest
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                  - $ref: "#/components/schemas/AgentFinishedEvent"
                  - $ref: "#/components/schemas/AgentRunningEvent"
                  - $ref: "#/components/schemas/AgentSelectedEvent"
                  - $ref: "#/components/schemas/AnswerEvent"
                  - $ref: "#/components/schemas/CaseStatusEvent"
                  - $ref: "#/components/schemas/IntentionGeneratedEvent"
                  - $ref: "#/components/schemas/MessageEvent"
                  - $ref: "#/components/schemas/QuestionEvent"
                  - $ref: "#/components/schemas/TextChunkEvent"
                  - $ref: "#/components/schemas/ThinkingEvent"
                  - $ref: "#/components/schemas/ToolRequestEvent"
                  - $ref: "#/components/schemas/ToolResponseEvent"
                  - $ref: "#/components/schemas/ToolSelectedEvent"
                  - $ref: "#/components/schemas/WarnEvent"
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        externalId:
          type: string
        firstname:
          type: string
        lastname:
          type: string
        bio:
          type: string
    Namespace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        description:
          type: string
      required:
      - name
    IntegrationConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        namespaceId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        integrationType:
          type: string
          minLength: 1
        description:
          type: string
        parameters:
          $ref: "#/components/schemas/JsonNode"
      required:
      - integrationType
      - name
      - namespaceId
    JsonNode: {}
    Case:
      type: object
      properties:
        id:
          type: string
          format: uuid
        namespaceId:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - PENDING
          - RUNNING
          - IDLE
          - KILLED
          - ERROR
        title:
          type: string
      required:
      - namespaceId
      - status
    PluginActionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
      - message
      - success
    PluginUploadResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        pluginId:
          type: string
      required:
      - message
      - success
    AddMessageRequest:
      type: object
      properties:
        content:
          type: string
        answerToEventId:
          type: string
          format: uuid
      required:
      - content
    Actor:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum:
          - USER
          - AGENT
      required:
      - displayName
      - id
      - role
    AgentFinishedEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          agentName:
            type: string
      required:
      - agentId
      - agentName
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    AgentRunningEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          agentName:
            type: string
      required:
      - agentId
      - agentName
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    AgentSelectedEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          agentId:
            type: string
            format: uuid
          agentName:
            type: string
      required:
      - agentId
      - agentName
      - caseId
      - id
      - metadata
      - namespaceId
      - timestamp
      - type
    AnswerEvent:
      allOf:
      - $ref: "#/components/schemas/CaseEvent"
      - type: object
        properties:
          actor:
            $ref: "#/components/schemas/Actor"
          answer:
            type: string
          questionId:
            type: string
            format: uuid
      required:
      - actor
      - answer
      - caseId
      - id
      - metadata
      - namespaceId
      - questionId
      - timestamp
      - type
    CaseEvent:
      type: object
      discriminator:
        propertyName: type
      properties:
        caseId:
          type: string
          format: uuid
        id:
          type: string
          format: uuid
        metadata:
          $ref: "#/components/schemas/EntityMetadata"
        namespaceId:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        type:
          type: string
          enum:
          - CaseStatusEvent
          - AgentSelectedEvent
          - MessageEvent
          - ToolRequestEvent
          - ToolResponseEvent
          - ThinkingEvent
          - AgentFinishedEvent
          - AgentRunningEvent
          - WarnEvent
          - ErrorEvent
          - QuestionEvent
          - AnswerEvent
          - IntentionGeneratedEvent
          - ToolSelectedEvent
          - TextChunkEvent
      required:
      - caseId
      - id
