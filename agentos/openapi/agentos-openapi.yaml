openapi: 3.1.0
info:
  title: AgentOS API
  description: REST API for AgentOS — orchestration of AI agents via plugins
  version: 0.0.1
servers:
- url: http://localhost:8123
  description: Generated server url
tags:
- name: sse
  description: "Server-Sent Events endpoints — use EventSource API, not HTTP client"
paths:
  /api/cases/{caseId}:
    get:
      tags:
      - case-controller
      operationId: getCase
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CaseResponse"
    put:
      tags:
      - case-controller
      operationId: updateCase
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaseRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CaseResponse"
  /api/tools/{toolName}/execute:
    post:
      tags:
      - tool-controller
      operationId: executeTool
      parameters:
      - name: toolName
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ToolExecutionResult"
  /api/plugins/{pluginId}/stop:
    post:
      tags:
      - plugin-controller
      operationId: stopPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/{pluginId}/start:
    post:
      tags:
      - plugin-controller
      operationId: startPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/{pluginId}/reload:
    post:
      tags:
      - plugin-controller
      operationId: reloadPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/upload:
    post:
      tags:
      - plugin-controller
      operationId: uploadPlugin
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginUploadResponse"
  /api/plugins/reload-agents:
    post:
      tags:
      - plugin-controller
      operationId: reloadAllAgents
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/cases:
    get:
      tags:
      - case-controller
      operationId: listCases
      parameters:
      - name: projectId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaseResponse"
    post:
      tags:
      - case-controller
      operationId: createCase
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CaseResponse"
  /api/cases/{caseId}/stop:
    post:
      tags:
      - case-controller
      operationId: stopCase
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
  /api/cases/{caseId}/messages:
    post:
      tags:
      - case-controller
      operationId: addMessage
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMessageRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/cases/{caseId}/kill:
    post:
      tags:
      - case-controller
      operationId: killCase
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
  /api/tools:
    get:
      tags:
      - tool-controller
      operationId: listTools
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolOutput"
  /api/tools/{toolName}:
    get:
      tags:
      - tool-controller
      operationId: getTool
      parameters:
      - name: toolName
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ToolOutput"
  /api/plugins:
    get:
      tags:
      - plugin-controller
      operationId: getAllPlugins
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PluginInfo"
  /api/plugins/{pluginId}:
    get:
      tags:
      - plugin-controller
      operationId: getPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginInfo"
    delete:
      tags:
      - plugin-controller
      operationId: unloadPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/{pluginId}/debug:
    get:
      tags:
      - plugin-controller
      operationId: debugPlugin
      parameters:
      - name: pluginId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/plugins/debug:
    get:
      tags:
      - plugin-controller
      operationId: debugAllPlugins
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PluginActionResponse"
  /api/cases/{caseId}/events:
    get:
      tags:
      - sse
      summary: Stream case events via SSE
      description: "Server-Sent Events stream emitting all events generated during\
        \ case execution. Use the browser EventSource API to consume this endpoint,\
        \ not a regular HTTP client."
      operationId: streamEvents
      parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: "SSE stream — each event is a JSON-serialized case event (MessageEvent,\
            \ ToolRequestEvent, etc.)"
          content:
            text/event-stream: {}
components:
  schemas:
    UpdateCaseRequest:
      type: object
      properties:
        dummy:
          type: string
    CaseResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
      required:
      - id
      - projectId
    ToolExecutionResult:
      type: object
      properties:
        toolName:
          type: string
        success:
          type: boolean
        output:
          type: string
        executionDurationMs:
          type: integer
          format: int64
        errorType:
          type: string
        errorMessage:
          type: string
      required:
      - executionDurationMs
      - output
      - success
      - toolName
    PluginActionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
      - message
      - success
    PluginUploadResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        pluginId:
          type: string
      required:
      - message
      - success
    CreateCaseRequest:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
      required:
      - projectId
    AddMessageRequest:
      type: object
      properties:
        content:
          type: string
        userId:
          type: string
        answerToEventId:
          type: string
          format: uuid
      required:
      - content
      - userId
    ToolOutput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        inputSchema:
          type: string
      required:
      - description
      - inputSchema
      - name
      - version
    PluginInfo:
      type: object
      properties:
        id:
          type: string
        version:
          type: string
        state:
          type: string
          enum:
          - CREATED
          - DISABLED
          - RESOLVED
          - STARTED
          - STOPPED
          - FAILED
          - UNLOADED
        description:
          type: string
        provider:
          type: string
        agentCount:
          type: integer
          format: int32
        pluginPath:
          type: string
      required:
      - agentCount
      - description
      - id
      - pluginPath
      - provider
      - state
      - version
