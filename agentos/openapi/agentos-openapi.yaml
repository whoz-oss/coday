  /api/prompts:
    get:
      tags:
      - prompt-controller
      summary: List Prompts by explicit scope
      description: |-
        Returns prompts for the given scope. `namespaceId` is required for `NAMESPACE` and `USER_NAMESPACE` scopes, and must be omitted for `PLATFORM` and `USER`.

        | scope          | namespaceId | returned prompts                  | required permission       |
        |----------------|-------------|-----------------------------------|---------------------------|
        | PLATFORM       | absent      | platform-level (null, null)       | authenticated             |
        | NAMESPACE      | required    | namespace-shared (ns, null)       | READ on namespace         |
        | USER           | absent      | user-global (null, me)            | authenticated             |
        | USER_NAMESPACE | required    | user × namespace (ns, me)        | READ on namespace         |
      operationId: listPrompt
      parameters:
      - name: scope
        in: query
        description: Scope of prompts to return.
        required: true
        schema:
          type: string
          enum:
          - PLATFORM
          - NAMESPACE
          - USER
          - USER_NAMESPACE
      - name: namespaceId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prompt"
    post:
      tags:
      - prompt-controller
      summary: Create a Prompt
      description: |-
        Scope is inferred from `(body.namespaceId, body.userId)`:

        | body.namespaceId | body.userId      | scope           | required permission        |
        |------------------|------------------|-----------------|----------------------------|
        | null             | null             | platform        | Super Admin only           |
        | present          | null             | namespace       | WRITE on the namespace     |
        | null             | <currentUser.id> | user-global     | authenticated only         |
        | present          | <currentUser.id> | user×namespace  | READ on the namespace      |

        `body.userId` must equal the authenticated user's id when supplied. A `namespaceId` that does not exist returns 404.
      operationId: createPrompt
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Prompt"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"
