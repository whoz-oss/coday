  /api/integration-configs:
    get:
      tags:
      - integration-config-controller
      summary: List IntegrationConfigs by scope
      description: |-
        Scope is inferred from the query params :

        | query                            | mode             | required permission                            |
        |----------------------------------|------------------|------------------------------------------------|
        | (no params)                      | platform         | authenticated                                  |
        | `?namespaceId=<uuid>`            | NS-shared        | READ on the namespace (empty list if missing)  |
        | `?namespaceId=<uuid>&userId=me`  | user × namespace | authenticated                                  |
        | `?namespaceId=none&userId=me`    | user-global      | authenticated                                  |
        | `?userId=me` (no namespace)      | all caller's     | authenticated                                  |

        `userId` accepts ONLY the literal sentinel `me` — a UUID returns 400. `namespaceId=none` is the sentinel for `namespaceId IS NULL`.

        When called with no params, returns platform-level configs.
      operationId: listIntegrationConfig
      parameters:
      - name: namespaceId
        in: query
        required: false
        schema:
          type: string
      - name: userId
        in: query
        required: false
