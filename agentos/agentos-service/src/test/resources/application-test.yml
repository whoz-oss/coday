spring:
  application:
    name: agentos-service-test

  jackson:
    serialization:
      write-dates-as-timestamps: false

  ai:
    openai:
      api-key: test-key
    anthropic:
      api-key: test-key

server:
  port: 0  # Random port for tests

agentos:
  plugins:
    dir: build/test-plugins
  persistence:
    mode: in-memory

logging:
  level:
    root: WARN
    io.whozoss.agentos.service: INFO
    org.pf4j: INFO
