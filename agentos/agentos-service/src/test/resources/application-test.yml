spring:
  application:
    name: agentos-service-test
  
  ai:
    openai:
      api-key: test-key
    anthropic:
      api-key: test-key

server:
  port: 0  # Random port for tests

agentos:
  plugins:
    dir: build/test-plugins
  persistence:
    mode: in-memory
  bootstrap:
    # Disabled in tests — fixtures manage their own users, the bootstrap
    # invariants (default admin / single-user migration) would otherwise
    # contaminate the in-memory DB.
    enabled: false

logging:
  level:
    root: WARN
    io.whozoss.agentos.service: INFO
    org.pf4j: INFO
