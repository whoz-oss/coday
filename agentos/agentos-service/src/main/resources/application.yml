spring:
  application:
    name: agentos
  cloud:
    # Spring Cloud 2024.0.x (Moore) targets Spring Boot 3.4.x officially.
    # AgentOS runs Spring Boot 3.5.x which is functionally compatible but
    # triggers the built-in version guard. Disable the guard globally so the
    # service starts cleanly in all profiles (standalone, whoz, test).
    compatibility-verifier:
      enabled: false
    config:
      # Disable Cloud Config by default. Enabled only with the 'whoz' profile.
      enabled: false
    discovery:
      # Disable service discovery (Eureka) by default. Enabled only with the
      # 'whoz' profile. Without this, EurekaClientAutoConfiguration fires and
      # requires TransportClientFactories even in standalone mode.
      enabled: false
  ai:
    chat:
      client:
        enabled: false
      observations:
        include-error-logging: true
    tools:
      observations:
        include-content: false
    model:
      chat: none
      audio:
        speech: none
        transcription: none
      image: none
      embedding: none
      moderation: none
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4-turbo-preview
          temperature: 0.7
    
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-3-5-sonnet-20241022
          temperature: 0.7
    
    ollama:
      init:
        # Prevent the Ollama starter from pulling models at startup.
        # Model creation is managed exclusively by ChatModelFactory.
        pull-model-strategy: never
    mcp:
      client:
        enabled: ${MCP_ENABLED:false}

server:
  port: 8124
  compression:
    enabled: false
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      # Use /management as base path to follow Whoz backend conventions.
      # Eureka health check URL is configured accordingly in application-whoz.yml.
      base-path: /management
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # 'always' so that Eureka can read the health status without credentials.
      # The health endpoint itself does not expose sensitive data.
      show-details: always
# cmd line to run datadog container
# docker run -d \
# -e DD_API_KEY=xxxxxx \
# -e DD_SITE=datadoghq.eu \
# -e DD_HOSTNAME=thomas.martin \
# -e DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true \
# -p 8126:8126 -p 8127:8125/udp \
# datadog/agent:latest

agentos:
  case:
  # Grace period (ms) before an idle runtime with no SSE subscribers is evicted.
  # Override with env var: AGENTOS_CASE_IDLE_EVICTION_GRACE_MS
  # idle-eviction-grace-ms: 300000
  # Interval (ms) between SSE keep-alive comment frames sent to connected clients.
  # Override with env var: AGENTOS_CASE_SSE_HEARTBEAT_INTERVAL_MS
  # sse-heartbeat-interval-ms: 30000
  defaults:
  # Environment-level fallback agent name. Consulted when a namespace has no
  # defaultAgentName configured. The named agent must exist in the case's namespace.
  # Override with env var: AGENTOS_DEFAULTS_AGENT_NAME
  # agent-name: copilot
  plugins:
    dir: ${PLUGINS_DIR:plugins/}
  security:
    # Identity resolution mode: 'local' (default) or 'auth'.
    # local: uses the OS username; auto-creates a User record on first access.
    # auth:  decodes the Cloudflare JWT (CF_Authorization header) or falls back
    #        to x-forwarded-email; requires the User to be pre-registered.
    # Override with env var: AGENTOS_SECURITY_MODE
    mode: local
  bootstrap:
    # Enable bootstrap service to run on startup
    # Override with env var: AGENTOS_BOOTSTRAP_ENABLED
    enabled: true
    # External identifier of the auto-created admin when the database is empty.
    # If unset, falls back to the JVM user.name system property — which matches
    # the OS user in 'local' mode and lets the bootstrap admin be immediately
    # usable on first request without further configuration.
    # In 'auth' mode, set this to the email expected from JWT claims.
    # Override with env var: AGENTOS_BOOTSTRAP_ADMIN_EXTERNAL_ID
    # admin-external-id: admin
  persistence:
    # Root directory for persisted JSON files. Relative to the working directory.
    # Override with env var: AGENTOS_PERSISTENCE_DATA_DIR
    data-dir: data/
    # Persistence mode:
    #   embedded-neo4j (default) - embedded Neo4j engine, no Docker required;
    #                              database stored under data-dir/neo4j/
    #   neo4j                    - standalone Neo4j server (requires spring.neo4j.* config)
    # Override with env var: AGENTOS_PERSISTENCE_MODE
    mode: ${AGENTOS_PERSISTENCE_MODE:embedded-neo4j}

logging:
  level:
    root: INFO
    io.whozoss.agentos.service: DEBUG
    org.pf4j: DEBUG
    org.springframework.ai: DEBUG
    # Neo4j driver emits ClientNotification warnings (e.g. UnknownPropertyKeyWarning,
    # UnknownRelationshipTypeWarning) for optional node properties or relationship types
    # that are absent on some nodes. These are harmless — SDN queries all declared fields
    # regardless of whether every node has them, and BELONGS_TO edges are absent until the
    # first entity of each type is written — but they flood the logs on a fresh database.
    # SDN routes these notifications through org.springframework.data.neo4j.cypher.*
    # (ResultSummaries.logNotifications guards on cypherLog.isWarnEnabled). Setting the
    # parent logger to ERROR suppresses all notification categories at once.
    org.neo4j.driver: ERROR
    org.springframework.data.neo4j.cypher: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
