spring:
  application:
    name: agentos
  
  # Spring AI configuration (using environment variables)
  ai:
    anthropic:
      api-key: ${SPRING_AI_ANTHROPIC_API_KEY:}
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:}

server:
  port: ${AGENTOS_PORT:8124}
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

agentos:
  plugins:
    dir: ${PLUGINS_DIR:/app/plugins/}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    io.whozoss.agentos.service: ${LOGGING_LEVEL_IO_BIZNET_AGENTOS:INFO}
    org.pf4j: INFO
    org.springframework.boot: INFO
