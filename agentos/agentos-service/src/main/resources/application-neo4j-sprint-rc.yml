# Neo4j persistence profile
# Activate with: --spring.profiles.active=neo4j
# Or set AGENTOS_PERSISTENCE_MODE=neo4j in environment.
#
# Local development:
#   docker compose up neo4j
#   Then start the service with this profile.

agentos:
  persistence:
    mode: neo4j

spring:
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
#      username: ${NEO4J_USERNAME:neo4j} define these in application-neo4j-sprint-rc_transient.yml
#      password: ${NEO4J_PASSWORD:agentos-dev}
  data:
    neo4j:
      repositories:
        type: imperative
      database: agentos
