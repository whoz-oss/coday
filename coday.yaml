# Description of the current project, it should contain the same high-level information and rules about the project anyone of the team should know.
#
# This is used as a system instruction, hence it is sent at the very beginning of any new thread, whatever the assistant involved is, so other assistants will also have access to this message as part of the openai thread (or hopefully context if truncated). If using the default Coday assistant (that is kept quite generic and close to default LLM), the more detailed and broad the description, the more Coday's responses are relevant (by a very wide margin).
#
# Recommendations: write it in markdown as you would write human-intended documentation
description: |
  ## Project description

  Coday is a lightweight framework to use AI agents on existing scoped projects, with as much autonomy as wanted through
  contextual understanding and tool integration. It runs locally and interfaces with various APIs and tools to provide a
  comprehensive assistance experience, or even full-autonomous work capability.

  ## Repository

  The repo is hosted at https://github.com/whoz-oss/coday (owned by `whoz-oss`).

mandatoryDocs:

optionalDocs:
  - path: ./docs/to-rework/PROJECT_CONFIGURATION.md
    description: How the project configuration works

# Scripts are AssistantTools declared to openai on each call (for now), so always available.
# Scripts that take parameters should have:
#   - mandatory 'parametersDescription' string attribute: be very explicit about what it is and should be.
#   - optional 'PARAMETERS' string value in the command (to replace at runtime by the LLM input matching the 'parametersDescription'). If absent, the LLM input parameters are added as suffix to the command.
# Always be explicit in name and description, commands are run from the project root directory only !
#
# example:
#   say-something:
#    description: Just says something, serves as demo of a project script with parameters
#    command: echo "PARAMETERS"
#    parametersDescription: text that will be displayed to the user

scripts:
  nx:
    description: |
      Run Nx commands for the monorepo. Nx is the build system orchestrating all projects.
      
      Common targets:
      - build: Compile a project (e.g., "nx build client")
      - test: Run tests (e.g., "nx test server", "nx test agentos-service")
      - lint: Run linter (e.g., "nx lint client")
      - serve: Start dev server (e.g., "nx serve client")
      
      Common commands:
      - "test agentos-service" - Run all Kotlin tests for AgentOS service
      - "test client" - Run all Angular client tests
      - "lint server" - Lint the server code
      - "build client" - Build the Angular client
      - "run-many --target=test --all" - Run all tests in monorepo
      - "run-many --target=build --all" - Build all projects
      - "affected --target=test" - Test only affected projects
      - "list" - List all projects in workspace
      - "show project client" - Show project configuration
      
      For Kotlin-specific test filtering (e.g., specific test class):
      Use gradle directly: "cd agentos && ./gradlew :agentos-service:test --tests ChatClientProviderTest"
      
      Note: Nx handles both TypeScript (Jest) and Kotlin (Gradle) projects seamlessly.
      
      ⚠️ Do not run interactive commands!
      ⚠️ Commands that modify dependencies require user confirmation.
    command: pnpm nx PARAMETERS
    parametersDescription: |
      Nx command with arguments. Examples:
      - "test agentos-service"
      - "build client"
      - "run-many --target=test --all"
      - "affected --target=build --base=origin/master"
      - "graph"
  gradle:
    description: |
      Run Gradle commands for Kotlin/Java projects in the agentos/ directory.
      
      Common commands:
      - ":agentos-service:test" - Run all service tests
      - ":agentos-service:test --tests ChatClientProviderTest" - Run specific test class
      - ":agentos-service:build" - Build the service
      - ":agentos-sdk:test" - Run SDK tests
      - "test" - Run all tests in agentos/
      - "build" - Build all Gradle projects
      
      The command runs from agentos/ directory with optimized flags:
      --no-build-cache, --no-configuration-cache, --no-daemon
    command: cd agentos && ./gradlew PARAMETERS --no-build-cache --no-configuration-cache --no-daemon
    parametersDescription: |
      Gradle task with arguments. Examples:
      - ":agentos-service:test"
      - ":agentos-service:test --tests ChatClientProviderTest"
      - ":agentos-sdk:build"
      - "test" (all tests)
  pnpm:
    description: |
      Run pnpm commands for package management and scripts.
      Use for installing dependencies, running package.json scripts, etc.
      
      Common commands:
      - "install" - Install dependencies
      - "add <package>" - Add a dependency
      - "remove <package>" - Remove a dependency
      - "web" - Start web interface (from package.json)
      - "start" - Start terminal interface
      
      ⚠️ Do not run interactive commands!
      ⚠️ Commands that modify dependencies require user confirmation.
    command: pnpm PARAMETERS
    parametersDescription: |
      pnpm command with arguments. Examples:
      - "install"
      - "add -D @types/node"
      - "web"
    requireConfirmation: true

# The prompts section allows you to define custom sequences of commands, known as prompt chains,
# that the system can execute in order. Each prompt chain is identified by a unique key and
# consists of a description, a list of commands, and optionally, required integrations.
#
# Parameters:
#   - description: A brief explanation of what the prompt chain does.
#   - commands: An array of commands that will be executed in sequence. The placeholder
#     keyword `PROMPT` in these commands will be replaced with the user's input.
#   - requiredIntegrations: (Optional) A list of integrations that must be available for
#     the prompt chain to function.
#
# Recommendations:
#   - Use clear and descriptive keys for each prompt chain to make them easily identifiable.
#   - Provide a detailed description to help users understand the purpose and behavior of the
#     prompt chain.
#   - Ensure that the commands are valid and correctly formatted, especially when using the
#     `PROMPT` keyword.
#   - Specify any required integrations to make the prompt available.

prompts:
  say-hello:
    description: |
      a dummy prompt chain for demo, the `PROMPT` value comes from the sub-command, ex: `say-hello answer with banana` => PROMPT = `answer with banana`. PROMPT can be used in several commands.
    commands:
      - '@ hello, PROMPT'
      - '@ how are you ?'
    requiredIntegrations:
      - 'GIT'

ai:
  - name: anthropic
  - name: openai
  - name: google
  - name: mistral
    url: https://api.mistral.ai/v1
    models:
      - name: mistral-large-latest
        alias: BIG
        contextWindow: 128000
  - name: ollama
    url: http://localhost:11434/v1
    apiKey: none but value needed anyway
    models:
      - name: qwen3:8b
        alias: qwen
        contextWindow: 32000

mcp:
  servers:
    - id: fetch
      name: FETCH
      enabled: true
      args:
        - mcp-server-fetch
        - --ignore-robots-txt
      command: uvx
      debug: false
    - id: github
      name: GITHUB
      enabled: true
      command: docker
      whiteListedHostEnvVarNames:
        - GITHUB_PERSONAL_ACCESS_TOKEN
      args:
        - run
        - -i
        - --rm
        - -e
        - GITHUB_PERSONAL_ACCESS_TOKEN
        - ghcr.io/github/github-mcp-server
    # IMPORTANT, add through mcp config of GITHUB at user level the env variable holding your access token, and the command
    #    env:
    #      GITHUB_PERSONAL_ACCESS_TOKEN: your_github_access_token
    #    command: /path/to/docker
    - id: playwright
      name: PLAYWRIGHT
      enabled: true
      args:
        - '@playwright/mcp@latest'
        - "--user-data-dir=/Users/vincent.audibert/Library/Application Support/Google/Chrome/Profile 1"
      command: npx
      debug: false
    - id: chrome
      name: CHROME
      enabled: true
      args:
        - 'chrome-devtools-mcp@latest'
      command: npx
      debug: false
