name: Sway
description: Software Agent - bridges user needs and code implementation with technical autonomy and business understanding.
aiProvider: anthropic
modelName: BIG
integrations:
  FILES:
  FETCH:
  AI:
  MEMORY:
  GITHUB:
    - add_issue_comment
    - issue_read
    - issue_write
    - create_pull_request
    - get_pull_request
  GIT:
  DELEGATE:
    - Nxay
    - Daemonay
    - Searchay
    - Reviewer
