<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodayTwin Preferences</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #1a1030 0%, #0d0d1a 100%);
        color: #e0e0e0;
        padding: 40px;
        -webkit-app-region: drag;
        user-select: none;
      }

      .container {
        max-width: 480px;
        margin: 0 auto;
        -webkit-app-region: no-drag;
      }

      h1 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #ffffff;
      }

      .subtitle {
        font-size: 14px;
        color: #888;
        margin-bottom: 32px;
      }

      .section {
        background: #16213e;
        border: 2px solid #0f3460;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }

      .section-title {
        font-size: 13px;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
      }

      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .setting-label {
        font-size: 15px;
        font-weight: 500;
        color: #ffffff;
      }

      .path-display {
        font-size: 12px;
        color: #999;
        font-family: 'SF Mono', 'Menlo', monospace;
        margin-top: 8px;
        padding: 8px 12px;
        background: #0d1b2a;
        border-radius: 6px;
        word-break: break-all;
        line-height: 1.4;
      }

      .new-path-section {
        display: none;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #0f3460;
      }

      .new-path-section.visible {
        display: block;
      }

      .new-path-label {
        font-size: 12px;
        color: #533483;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .btn-row {
        display: flex;
        justify-content: flex-end;
        margin-top: 24px;
        gap: 12px;
      }

      button {
        padding: 8px 20px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-primary {
        background: #533483;
        color: #ffffff;
      }

      .btn-primary:hover {
        background: #6b44a0;
      }

      .btn-primary:disabled {
        background: #333;
        color: #666;
        cursor: not-allowed;
      }

      .btn-secondary {
        background: transparent;
        color: #999;
        border: 1px solid #333;
      }

      .btn-secondary:hover {
        background: #1a2744;
        color: #ccc;
      }

      .btn-change {
        padding: 6px 16px;
        font-size: 13px;
      }

      .status-message {
        display: none;
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
      }

      .status-message.success {
        display: block;
        background: #0d2818;
        color: #4caf50;
        border: 1px solid #1b5e20;
      }

      .status-message.error {
        display: block;
        background: #2d0a0a;
        color: #ef5350;
        border: 1px solid #b71c1c;
      }

      /* Toggle switch */
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0;
      }

      .toggle {
        position: relative;
        width: 44px;
        height: 24px;
        flex-shrink: 0;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #333;
        border-radius: 24px;
        transition: background 0.2s ease;
      }

      .toggle-slider::before {
        content: '';
        position: absolute;
        width: 18px;
        height: 18px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.2s ease;
      }

      .toggle input:checked + .toggle-slider {
        background: #533483;
      }

      .toggle input:checked + .toggle-slider::before {
        transform: translateX(20px);
      }

      .slack-fields {
        display: none;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid #0f3460;
      }

      .slack-fields.visible {
        display: block;
      }

      .field-label {
        font-size: 12px;
        color: #888;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        margin-bottom: 6px;
        margin-top: 12px;
      }

      .field-label:first-child {
        margin-top: 0;
      }

      .text-input {
        width: 100%;
        padding: 9px 12px;
        background: #0d1b2a;
        border: 1px solid #0f3460;
        border-radius: 8px;
        color: #e0e0e0;
        font-family: 'SF Mono', 'Menlo', monospace;
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s ease;
      }

      .text-input:focus {
        border-color: #533483;
      }

      .text-input::placeholder {
        color: #555;
      }

      .help-text {
        font-size: 12px;
        color: #555;
        margin-top: 6px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Preferences</h1>
      <p class="subtitle">Manage your CodayTwin settings.</p>

      <div class="section">
        <div class="section-title">Workspace Location</div>
        <div class="setting-row">
          <div class="setting-label">Current folder</div>
          <button class="btn-secondary btn-change" onclick="browsePath()">Change…</button>
        </div>
        <div class="path-display" id="current-path">Loading...</div>

        <div class="new-path-section" id="new-path-section">
          <div class="new-path-label">New location</div>
          <div class="path-display" id="new-path"></div>
        </div>
      </div>

      <!-- Slack Notifications -->
      <div class="section">
        <div class="section-title">Slack Notifications</div>
        <div class="toggle-row">
          <div class="setting-label">Enable notifications</div>
          <label class="toggle">
            <input type="checkbox" id="slack-enabled" onchange="onSlackToggle()" />
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="slack-fields" id="slack-fields">
          <div class="field-label">Webhook URL</div>
          <input
            type="url"
            class="text-input"
            id="slack-webhook-url"
            placeholder="https://hooks.slack.com/services/..."
            oninput="onSlackInput()"
            autocomplete="off"
            spellcheck="false"
          />
          <div class="help-text">Create an incoming webhook in your Slack workspace settings.</div>

          <div class="field-label" style="margin-top: 14px">Your Slack User ID</div>
          <input
            type="text"
            class="text-input"
            id="slack-user-id"
            placeholder="U0123ABCDEF"
            oninput="onSlackInput()"
            autocomplete="off"
            spellcheck="false"
          />
          <div class="help-text">Found in your Slack profile → More → Copy member ID.</div>
        </div>
      </div>

      <div class="status-message" id="status-message"></div>

      <div class="btn-row">
        <button class="btn-secondary" onclick="closeWindow()">Close</button>
        <button class="btn-primary" id="btn-save" onclick="save()" disabled>Save</button>
      </div>
    </div>

    <script>
      let currentPath = null
      let newPath = null
      let slackDirty = false

      async function init() {
        try {
          currentPath = await window.electronAPI.preferencesGetCurrentPath()
          document.getElementById('current-path').textContent = currentPath || 'Not configured'
        } catch (error) {
          document.getElementById('current-path').textContent = 'Error loading path'
        }

        try {
          const slack = await window.electronAPI.preferencesGetSlackConfig()
          document.getElementById('slack-enabled').checked = slack.enabled
          document.getElementById('slack-webhook-url').value = slack.webhookUrl || ''
          document.getElementById('slack-user-id').value = slack.userId || ''
          if (slack.enabled) {
            document.getElementById('slack-fields').classList.add('visible')
          }
        } catch (error) {
          console.error('Failed to load Slack config:', error)
        }
      }

      function onSlackToggle() {
        const enabled = document.getElementById('slack-enabled').checked
        document.getElementById('slack-fields').classList.toggle('visible', enabled)
        slackDirty = true
        updateSaveButton()
      }

      function onSlackInput() {
        slackDirty = true
        updateSaveButton()
      }

      function updateSaveButton() {
        const enabled = document.getElementById('slack-enabled').checked
        const webhookUrl = document.getElementById('slack-webhook-url').value.trim()
        const userId = document.getElementById('slack-user-id').value.trim()
        const hasNewPath = !!newPath
        const slackValid = !enabled || (!!webhookUrl && !!userId)
        const canSave = (hasNewPath || slackDirty) && slackValid
        document.getElementById('btn-save').disabled = !canSave
      }

      async function browsePath() {
        try {
          const result = await window.electronAPI.preferencesBrowseFolder()
          if (result && result !== currentPath) {
            newPath = result
            document.getElementById('new-path').textContent = result
            document.getElementById('new-path-section').classList.add('visible')
            hideStatus()
            updateSaveButton()
          }
        } catch (error) {
          showStatus('Failed to open folder picker.', 'error')
        }
      }

      async function save() {
        document.getElementById('btn-save').disabled = true
        hideStatus()

        try {
          // Save workspace path if changed
          if (newPath) {
            await window.electronAPI.preferencesSave(newPath)
            currentPath = newPath
            newPath = null
            document.getElementById('current-path').textContent = currentPath
            document.getElementById('new-path-section').classList.remove('visible')
          }

          // Save Slack config if dirty
          if (slackDirty) {
            const enabled = document.getElementById('slack-enabled').checked
            const webhookUrl = document.getElementById('slack-webhook-url').value.trim()
            const userId = document.getElementById('slack-user-id').value.trim()
            await window.electronAPI.preferencesSaveSlackConfig({ enabled, webhookUrl, userId })
            slackDirty = false
          }

          showStatus('Settings saved successfully.', 'success')
        } catch (error) {
          document.getElementById('btn-save').disabled = false
          showStatus('Failed to save settings.', 'error')
        }
      }

      function closeWindow() {
        window.electronAPI.preferencesClose()
      }

      function showStatus(message, type) {
        const el = document.getElementById('status-message')
        el.textContent = message
        el.className = 'status-message ' + type
      }

      function hideStatus() {
        const el = document.getElementById('status-message')
        el.className = 'status-message'
      }

      init()

      // Resize the Electron window to fit content whenever the DOM changes
      function fitWindow() {
        const h = document.body.scrollHeight
        if (window.electronAPI && window.electronAPI.resizeToContent) {
          window.electronAPI.resizeToContent(h)
        }
      }

      // Observe any DOM mutations (expanding sections, step switches)
      new MutationObserver(fitWindow).observe(document.body, { subtree: true, childList: true, attributes: true })
      window.addEventListener('load', fitWindow)
    </script>
  </body>
</html>
