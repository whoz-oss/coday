ai:
  - name: anthropic
    # Add your Anthropic API key via environment variable ANTHROPIC_API_KEY
    # or configure it in Coday's settings
    models:
      - name: claude-opus-4-6
        alias: opus
        contextWindow: 200000
        price:
          inputMTokens: 5
          cacheWrite: 6.25
          cacheRead: 0.5
          outputMTokens: 25
      - name: claude-haiku-4-5
        alias: haiku
        contextWindow: 200000
        price:
          inputMTokens: 0.8
          cacheWrite: 1
          cacheRead: 0.08
          outputMTokens: 4

mcp:
  servers:
    - id: mcp_fetch
      name: FETCH
      enabled: true
      args:
        - mcp-server-fetch
        - --ignore-robots-txt
      command: uvx
    - id: chrome
      name: CHROME
      enabled: true
      args:
        - "chrome-devtools-mcp@latest"
      command: npx
      debug: false

scripts:
  notify:
    description: |
      Sends a notification to the dedicated Slack channel, usually to indicate the end of a task, or ask the human user for new input.
    parametersDescription: |
      Parameters are the JSON body for the slack webhook with 3 fields:
      - message: what you want to tell in the notification
      - threadId: the ID of the current thread so that Slack can display a button for the user to come back to the current conversation
      - slackUserId: SLACK_USER_ID

      For example:
      {
        "message": "Your daily calendar analysis is done",
        "threadId": "6bb85e17-a5c6-4cf1-a6b4-0fa0004ff694"
        "slackUserId": "SLACK_USER_ID"
      }
    command: |
      curl -X POST SLACK_NOTIFY_WEBHOOK_URL -H 'Content-Type: application/json' -d 'PARAMETERS'
