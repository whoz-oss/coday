<div class="agent-list-page">
  <ds-entity-list
    title="Agents"
    [items]="agentItems()"
    cardMinWidth="450px"
    contentMaxWidth="1400px"
    searchPlaceholder="Filter agents…"
    emptyMessage="No file-based agents found."
    [showCreate]="true"
    [itemTemplate]="agentCard"
    (createRequested)="onCreate()"
  >
    <button toolbar-start mat-icon-button title="Back" (click)="onBack()">
      <mat-icon>chevron_left</mat-icon>
    </button>
  </ds-entity-list>

  @if (errorMessage()) {
    <div class="agent-list__error">{{ errorMessage() }}</div>
  }
</div>

<!-- Custom card template with actions -->
<ng-template #agentCard let-item>
  <ds-entity-card
    [id]="item.id"
    [name]="item.name"
    [description]="item.description"
    [badges]="item.badges ?? []"
    (selected)="onEdit($event)"
  >
    <ng-container dsCardActions>
      <button
        mat-icon-button
        [matMenuTriggerFor]="cardMenu"
        [matMenuTriggerData]="{ id: item.id }"
        (click)="$event.stopPropagation()"
      >
        <mat-icon>more_vert</mat-icon>
      </button>
    </ng-container>
  </ds-entity-card>
</ng-template>

<!-- Shared menu instance — data injected via matMenuTriggerData -->
<mat-menu #cardMenu="matMenu">
  <ng-template matMenuContent let-id="id">
    <button mat-menu-item (click)="onEdit(id)">
      <mat-icon>edit</mat-icon>
      Edit
    </button>
    <button mat-menu-item class="agent-list__delete-item" (click)="onDelete(id)">
      <mat-icon>delete</mat-icon>
      Delete
    </button>
  </ng-template>
</mat-menu>
