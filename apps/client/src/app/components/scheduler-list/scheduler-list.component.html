<div class="scheduler-list-page">
  <ds-entity-list
    title="Schedulers"
    [items]="schedulerItems()"
    searchPlaceholder="Filter schedulers…"
    emptyMessage="No schedulers found."
    [showCreate]="true"
    [itemTemplate]="schedulerCard"
    (createRequested)="onCreate()"
  >
    <button toolbar-start mat-icon-button title="Back" (click)="onBack()">
      <mat-icon>chevron_left</mat-icon>
    </button>
    <mat-slide-toggle
      toolbar-extras
      class="scheduler-list__mine-toggle"
      color="primary"
      [ngModel]="showOnlyMine()"
      (ngModelChange)="showOnlyMine.set($event)"
    >
      Mine
    </mat-slide-toggle>
  </ds-entity-list>

  @if (errorMessage()) {
    <div class="scheduler-list__error">{{ errorMessage() }}</div>
  }
</div>

<!-- Custom card template with actions -->
<ng-template #schedulerCard let-item>
  <ds-entity-card
    [id]="item.id"
    [name]="item.name"
    [description]="item.description"
    [badges]="item.badges ?? []"
    (selected)="onEdit($event)"
  >
    <ng-container dsCardActions>
      <button
        mat-icon-button
        [matMenuTriggerFor]="cardMenu"
        [matMenuTriggerData]="{ id: item.id }"
        (click)="$event.stopPropagation()"
      >
        <mat-icon>more_vert</mat-icon>
      </button>
    </ng-container>
  </ds-entity-card>
</ng-template>

<!-- Shared menu instance — data injected via matMenuTriggerData -->
<mat-menu #cardMenu="matMenu">
  <ng-template matMenuContent let-id="id">
    <button mat-menu-item (click)="onEdit(id)">
      <mat-icon>edit</mat-icon>
      Edit
    </button>
    <button mat-menu-item (click)="onToggleEnabled(id)">
      <mat-icon>{{ isEnabled(id) ? 'pause_circle' : 'play_circle' }}</mat-icon>
      {{ isEnabled(id) ? 'Disable' : 'Enable' }}
    </button>
    <button mat-menu-item (click)="onRunNow(id)">
      <mat-icon>play_arrow</mat-icon>
      Run now
    </button>
    <button mat-menu-item class="scheduler-list__delete-item" (click)="onDelete(id)">
      <mat-icon>delete</mat-icon>
      Delete
    </button>
  </ng-template>
</mat-menu>
